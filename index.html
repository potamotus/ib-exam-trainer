,"difficulty":"easy"},{"id":"L3-02","concept":"formal vs informal institutions; values; norms","type":"single","question":"Which definition matches 'norms'?","options":["Abstract ideas about what society believes is good, right and desirable","Uncodified social rules that prescribe appropriate behavior","Laws and regulations enforced by the state","The collective programming of the mind","The gap between home and host values"],"correct":[1],"explanation":"Верно: нормы (norms) — некодифицированные социальные правила, предписывающие надлежащее поведение. Первый вариант — это определение ценностей (values), а не норм (ловушка-подмена). «Laws and regulations» = формальные институты. «Collective programming of the mind» — определение культуры (Хофстеде). «Gap between home and host values» — культурная дистанция.","difficulty":"easy"},{"id":"L3-03","concept":"culture / collective programming of the mind","type":"single","question":"Hofstede famously defined culture as:","options":["the gap between home and host values and norms","the collective programming of the mind","a set of obligations to protect and enhance society","behavior that conforms to generally accepted social norms","the costs of doing business abroad"],"correct":[1],"explanation":"Верно: культура по Хофстеде — «collective programming of the mind» (коллективное программирование разума). Первый вариант — культурная дистанция (cultural distance). Третий — КСО (CSR). Четвёртый — этичное поведение (ethical behavior). Пятый — эффект чужеродности (liability of foreignness).","difficulty":"easy"},{"id":"L3-04","concept":"culture / collective programming of the mind","type":"single","question":"Formal institutions (codified laws) ultimately emerge from which chain?","options":["laws → behavior and customs → values and norms","values and norms → behavior and customs → codified laws","customs → values → religion → laws","profits → planet → people → laws","power distance → uncertainty avoidance → laws"],"correct":[1],"explanation":"Верно: цепочка формирования права — ценности/нормы → поведение и обычаи → кодифицированные законы; формальные институты суть продукт национальной культуры. Первый вариант — та же цепочка наоборот (ловушка-разворот). Остальные смешивают несвязанные концепции (детерминанты этики, triple bottom line, измерения Хофстеде).","difficulty":"medium"},{"id":"L3-05","concept":"5 elements of culture","type":"multi","question":"Select ALL items that are among the five elements of culture.","options":["Social structure","Language","Communication","Power distance","Religion"],"correct":[0,1,2,4],"explanation":"Пять элементов культуры (elements of culture): Social structure, Language, Communication, Religion, Values and attitudes. Верны социальная структура, язык, коммуникация и религия. Power distance (дистанция власти) — это измерение Хофстеде, а НЕ элемент культуры (ловушка-смешение двух разных схем).","difficulty":"medium"},{"id":"L3-06","concept":"5 elements of culture","type":"single","question":"Attitudes towards time, status and age belong to which element of culture?","options":["Social structure","Religion","Values and attitudes","Communication","Language"],"correct":[2],"explanation":"Верно: отношение ко времени, статусу и возрасту рассматривается в элементе «Values and attitudes» (ценности и установки). Social structure касается ролей индивидов, стратификации, мобильности. Religion — сакральные убеждения. Communication — кодирование/декодирование сообщений. Language — средство коммуникации.","difficulty":"easy"},{"id":"L3-07","concept":"social structure (nepotism, stratification, mobility)","type":"multi","question":"Within the 'social structure' element of culture, select ALL aspects it covers.","options":["The role of individuals, including extended family ties and nepotism","Social stratification into classes and castes","Social mobility — ability to move between social categories","High vs low context communication","Consequences on human capital"],"correct":[0,1,2,4],"explanation":"Социальная структура (social structure) включает: роль индивидов (семейные связи, непотизм (nepotism)); стратификацию (stratification) — классы, касты; мобильность (mobility) между категориями и её последствия для человеческого капитала. High/low context — подход Холла к коммуникации, не часть социальной структуры (ловушка).","difficulty":"medium"},{"id":"L3-08","concept":"social structure (nepotism, stratification, mobility)","type":"single","question":"Social mobility is best defined as:","options":["preferential hiring of relatives","the ability to move between social categories, with consequences on human capital","the division of society into fixed castes","the speed of adopting new technologies","employee turnover between competing firms"],"correct":[1],"explanation":"Верно: социальная мобильность (social mobility) — способность перемещаться между социальными категориями, влияет на человеческий капитал. Преференциальный найм родственников — это непотизм (nepotism). Деление на касты — стратификация (stratification). Остальные не относятся к определению.","difficulty":"medium"},{"id":"L3-09","concept":"language and nonverbal communication","type":"single","question":"Which statement about non-verbal communication is correct?","options":["It is a negligible part of a message and can be ignored across cultures","It carries the large majority of a message's meaning","It is identical in meaning across all cultures","It only matters in written communication","It is the same as a culture's formal contract language"],"correct":[1],"explanation":"Верно: невербальная коммуникация (non-verbal communication) несёт бóльшую часть смысла сообщения (в лекции — порядка 80–90%), поэтому ею нельзя пренебрегать и она различается между культурами. Остальные варианты противоречат сути: невербалика не пренебрежима, не универсальна, не сводится к письму или контрактному языку.","difficulty":"easy"},{"id":"L3-10","concept":"language and nonverbal communication","type":"multi","question":"Select ALL statements about language and communication that are correct.","options":["Messages are encoded and decoded by means of cultural filters","A common language is a competitive advantage in internationalization","Non-verbal cues such as greetings and the meaning of silence vary across cultures","Non-verbal signals carry the same meaning everywhere","Language shapes attitudes and guides behavior"],"correct":[0,1,2,4],"explanation":"Верны: сообщения кодируются/декодируются через культурные фильтры (cultural filters); общий язык — конкурентное преимущество в интернационализации; невербальные сигналы (приветствия, значение молчания) различаются между культурами; язык формирует установки. Неверно, что невербальные сигналы означают одно и то же везде — это прямо противоречит идее культурных различий в коммуникации (ловушка-инверсия).","difficulty":"medium"},{"id":"L3-11","concept":"high vs low context (Hall)","type":"single","question":"Which set of features best describes a LOW-context culture in Hall's approach?","options":["Trust over contracts, consensus decisions, relationship-based leadership","Explicit communication, detailed contracts, task-based leadership, individual responsibility","Implicit communication where relationships outweigh tasks","Heavy reliance on storytelling and informal meetings","Acceptance of unequal distribution of power"],"correct":[1],"explanation":"Верно: low-context (низкоконтекстная) — явная коммуникация (explicit), детальные контракты, индивидуальная ответственность, лидерство на задачах (tasks > relationships). Первый, третий и четвёртый варианты описывают high-context (высококонтекстную) культуру: доверие важнее контрактов, отношения > задач, сторителлинг (ловушка-инверсия полюсов). Последний — это дистанция власти, другая концепция.","difficulty":"medium"},{"id":"L3-12","concept":"high vs low context (Hall)","type":"single","question":"The high-context vs low-context distinction was developed by which authors, and what regions are typically high-context?","options":["Geert Hofstede; North America and Western Europe","Edward & Mildred Hall; Asia, the Middle East and Latin America","GLOBE Research Program; the Anglo cluster","Shalom Schwartz; Nordic Europe","Edward & Mildred Hall; North America, Western Europe and Australia"],"correct":[1],"explanation":"Верно: контекстный подход (context approach) — Edward & Mildred Hall; высококонтекстные регионы — Азия, Ближний Восток, Латинская Америка. Хофстеде и Шварц авторы измерений (dimensions approach), GLOBE — кластеров (cluster approach) (ловушка-перепутывание авторов). Пятый вариант указывает low-context регионы (Сев. Америка, Зап. Европа, Австралия), а вопрос про high-context.","difficulty":"medium"},{"id":"L3-13","concept":"GLOBE clusters (10)","type":"multi","question":"Select ALL options that are among the 10 GLOBE cultural clusters.","options":["Confucian Asia","Nordic Europe","Anglo","Indulgence","Sub-Saharan Africa"],"correct":[0,1,2,4],"explanation":"10 кластеров GLOBE включают Confucian Asia, Nordic Europe, Anglo, Sub-Saharan Africa (а также Eastern Europe, Latin America, Latin Europe, Southern Asia, Germanic Europe, Middle East). «Indulgence» (потворство) — полюс измерения Хофстеде, а НЕ кластер GLOBE (ловушка-смешение подходов).","difficulty":"medium"},{"id":"L3-14","concept":"GLOBE clusters (10)","type":"single","question":"How many cultural clusters does the GLOBE Research Program distinguish, and what is a cultural cluster?","options":["6 clusters; a scale between two cultural poles","10 clusters; a group of countries sharing many cultural similarities","5 clusters; the elements of culture","10 clusters; the determinants of ethics","17 clusters; the UN Sustainable Development Goals"],"correct":[1],"explanation":"Верно: GLOBE выделяет 10 кластеров (cultural clusters), кластер объединяет страны со множеством культурных сходств. 6 — это число измерений Хофстеде (ловушка). 5 — число элементов культуры или детерминантов этики. 17 — число ЦУР ООН (SDGs).","difficulty":"easy"},{"id":"L3-15","concept":"Hofstede: individualism/collectivism","type":"single","question":"In Hofstede's framework, a society endorsing individuals' absolute loyalty to a larger group within a tightly-knit social framework is:","options":["Individualism","Collectivism","High power distance","Uncertainty avoidance","Masculinity"],"correct":[1],"explanation":"Верно: коллективизм (collectivism) — абсолютная лояльность к большой группе, тесно связанная структура (tightly-knit). Индивидуализм (individualism) наоборот — действия в личных интересах, слабосвязанная структура (loosely-knit) (ловушка-противоположный полюс). Остальные — другие измерения.","difficulty":"easy"},{"id":"L3-16","concept":"Hofstede: individualism/collectivism","type":"multi","question":"Select ALL implications for international business associated with an INDIVIDUALIST culture.","options":["Individual career is more important than the organization","Performance-based compensation","High employee mobility","Compensation reflects group achievement","The organization is more important than individual career"],"correct":[0,1,2],"explanation":"Для индивидуализма (individualism): карьера важнее организации, оплата по результатам (performance-based compensation), высокая мобильность сотрудников. Варианты «оплата за достижения группы» и «организация важнее карьеры» относятся к коллективизму (collectivism) (ловушка-противоположный полюс).","difficulty":"medium"},{"id":"L3-17","concept":"Hofstede: power distance","type":"single","question":"Which implications for IB are linked to HIGH power distance?","options":["Organizational equality, trust over control, decentralization","Respect for authority, rigid hierarchies, centralization of power","Distributed decision-making and flat structures","Work-life balance and cooperative climate","Risk-taking and flexible rules"],"correct":[1],"explanation":"Верно: высокая дистанция власти (high power distance) — уважение к авторитету, жёсткие иерархии, централизация. Первый и третий варианты — низкая дистанция власти (low power distance): равенство, доверие > контроля, децентрализация (ловушка-противоположный полюс). Четвёртый — фемининность, пятый — принятие неопределённости.","difficulty":"medium"},{"id":"L3-18","concept":"Hofstede: power distance","type":"single","question":"Members of a society who do NOT accept an unequal distribution of power exhibit:","options":["High power distance","Low power distance","Collectivism","Uncertainty avoidance","Restraint"],"correct":[1],"explanation":"Верно: непринятие неравного распределения власти = низкая дистанция власти (low power distance). High power distance — наоборот, принятие неравенства (ловушка). Коллективизм, избегание неопределённости и сдержанность — другие измерения.","difficulty":"easy"},{"id":"L3-19","concept":"Hofstede: uncertainty avoidance/acceptance","type":"multi","question":"Select ALL features associated with an UNCERTAINTY AVOIDANCE culture.","options":["Fear of failure and change","Risk-averse environment","Rigid hierarchies, rules and procedures","High employee mobility","Low employee mobility"],"correct":[0,1,2,4],"explanation":"Избегание неопределённости (uncertainty avoidance): страх неудачи и перемен, риск-аверсия, жёсткие иерархии/правила, низкая мобильность сотрудников. «High employee mobility» относится к принятию неопределённости (uncertainty acceptance) (ловушка-противоположный полюс), там же гибкие правила и риск-тейкинг.","difficulty":"medium"},{"id":"L3-20","concept":"Hofstede: uncertainty avoidance/acceptance","type":"single","question":"Which definition matches uncertainty acceptance?","options":["Society members are averse of uncertainty and ambiguity","Society members readily accept uncertainty and ambiguity","Society members accept unequal distribution of power","Society endorses past- and present-oriented values","Society endorses self-control and suppressing human needs"],"correct":[1],"explanation":"Верно: принятие неопределённости (uncertainty acceptance) — общество легко принимает неопределённость и неоднозначность. Первый вариант — избегание неопределённости (uncertainty avoidance) (ловушка-инверсия). Третий — высокая дистанция власти, четвёртый — краткосрочная ориентация, пятый — сдержанность.","difficulty":"easy"},{"id":"L3-21","concept":"Hofstede: masculinity/femininity","type":"single","question":"Feminine values in Hofstede's framework include:","options":["Career, money and success","Work-life balance, high-quality relationships, trust and support","Acceptance of unequal power distribution","Future-oriented perspective","Gratification of human needs"],"correct":[1],"explanation":"Верно: фемининность (femininity) — баланс работы и жизни, качественные отношения, доверие и поддержка → кооперативный климат. Первый вариант — маскулинность (masculinity): карьера, деньги, успех (ловушка-противоположный полюс). Остальные — другие измерения (PDI, LTO, Indulgence).","difficulty":"easy"},{"id":"L3-22","concept":"Hofstede: masculinity/femininity","type":"single","question":"A competitive, results-oriented organizational climate is the IB implication of which dimension pole?","options":["Femininity","Masculinity","Low power distance","Uncertainty acceptance","Short-term orientation"],"correct":[1],"explanation":"Верно: маскулинность (masculinity) → конкурентный, ориентированный на результат климат. Фемининность (femininity) даёт кооперативный, толерантный климат (ловушка-противоположный полюс). Остальные — другие измерения.","difficulty":"medium"},{"id":"L3-23","concept":"Hofstede: long/short-term orientation","type":"single","question":"Long-term orientation is defined as a society's endorsement of:","options":["past- and present-oriented values","a future-oriented perspective","acting in the individual interests","having fun and gratification of human needs","a tightly-knit social framework"],"correct":[1],"explanation":"Верно: долгосрочная ориентация (long-term orientation) — ориентация на будущее. Первый вариант — краткосрочная ориентация (short-term orientation) (ловушка-инверсия). Остальные — индивидуализм, потворство, коллективизм.","difficulty":"easy"},{"id":"L3-24","concept":"Hofstede: long/short-term orientation","type":"multi","question":"Select ALL IB implications consistent with a SHORT-term orientation culture.","options":["Respect for society's traditions","Focus on the 'here and now'","Focus on short-term decisions","Pragmatism, perseverance and hard work toward long-term success","Future-oriented investments above all"],"correct":[0,1,2],"explanation":"Краткосрочная ориентация (short-term orientation): уважение традиций, фокус «здесь и сейчас», краткосрочные решения. Прагматизм/упорство/долгосрочный успех и фокус на будущем относятся к долгосрочной ориентации (long-term orientation) (ловушка-противоположный полюс).","difficulty":"medium"},{"id":"L3-25","concept":"Hofstede: indulgence/restraint","type":"single","question":"A country scores very low on the Indulgence dimension. Which interpretation is correct?","options":["It is a strongly indulgent culture emphasizing leisure and gratification of needs","It is a restrained culture emphasizing self-control, suppression of needs and stricter social norms","It necessarily has low power distance","It necessarily has weak uncertainty avoidance","It necessarily has a short-term orientation"],"correct":[1],"explanation":"Верно: низкий балл по измерению Indulgence означает сдержанную (restraint) культуру — самоконтроль, подавление потребностей, более жёсткие социальные нормы. Высокий балл был бы потворством (indulgence) (ловушка-инверсия полюса). Остальные варианты подменяют это измерение другими (дистанция власти, избегание неопределённости, ориентация во времени) — балл по Indulgence сам по себе о них ничего не говорит.","difficulty":"medium"},{"id":"L3-26","concept":"Hofstede: indulgence/restraint","type":"single","question":"Indulgence is defined as a society's endorsement of:","options":["self-control and suppressing human needs","having fun and the gratification of human needs","absolute loyalty to a larger group","averse of uncertainty and ambiguity","unequal distribution of power"],"correct":[1],"explanation":"Верно: потворство (indulgence) — веселье и удовлетворение потребностей. Первый вариант — сдержанность (restraint) (ловушка-инверсия). Остальные — коллективизм, избегание неопределённости, высокая дистанция власти.","difficulty":"easy"},{"id":"L3-27","concept":"cultural distance / liability of foreignness","type":"single","question":"Cultural distance is defined as:","options":["the collective programming of the mind","the gap between home and host values and norms","the costs of doing business abroad outside the home cultural region","a distinctive complex pattern of interrelated dimensions","the share of non-verbal communication in a message"],"correct":[1],"explanation":"Верно: культурная дистанция (cultural distance) — разрыв между ценностями/нормами home- и host-страны. Третий вариант — это эффект чужеродности (liability of foreignness), близкая, но отдельная концепция (дистанция — «топливо» эффекта; ловушка-смешение). Первый — культура (Хофстеде), четвёртый — культурные профили, пятый — невербалика.","difficulty":"medium"},{"id":"L3-28","concept":"cultural distance / liability of foreignness","type":"multi","question":"Increasing cultural distance raises which of the following? Select ALL that apply.","options":["Misunderstanding risk","Coordination costs","Time to build trust","Probability of conflict","Performance-based compensation"],"correct":[0,1,2,3],"explanation":"Рост культурной дистанции (cultural distance) увеличивает: риск недопонимания, координационные издержки, время на построение доверия, вероятность конфликта. «Performance-based compensation» — это следствие индивидуализма по Хофстеде, никак не связано с дистанцией (ловушка из другого блока).","difficulty":"medium"},{"id":"L3-29","concept":"cross-cultural literacy / acculturation / ethnocentrism","type":"multi","question":"Select ALL recommended ways to achieve cross-cultural literacy.","options":["Personal experience abroad","Cross-cultural training programs","Hiring locals in host countries","Imposing home-country norms on the host country","Hiring foreigners at home and using experienced managers"],"correct":[0,1,2,4],"explanation":"Кросс-культурная грамотность (cross-cultural literacy) достигается через личный опыт, тренинги, наём местных в host-странах, наём иностранцев дома, опытных менеджеров и литературу. «Навязывание норм страны происхождения» — это этический империализм / этноцентризм (ethnocentrism), прямо противоположно цели (ловушка).","difficulty":"medium"},{"id":"L3-30","concept":"cross-cultural literacy / acculturation / ethnocentrism","type":"single","question":"The acculturation process is best described as:","options":["forcing a host country to adopt the home culture","adapting to and understanding a foreign culture without being ethnocentric","measuring culture on six numerical dimensions","grouping countries into supra-national clusters","pretending to be sustainable for short-term gain"],"correct":[1],"explanation":"Верно: аккультурация (acculturation) — адаптация и понимание чужой культуры, без этноцентризма (ethnocentric). Первый вариант — этноцентризм/империализм (ловушка-инверсия). Третий — подход Хофстеде, четвёртый — кластеры GLOBE, пятый — гринвошинг.","difficulty":"easy"},{"id":"L3-31","concept":"ethics determinants","type":"multi","question":"Select ALL of the five determinants of ethics.","options":["Childhood","Culture","Personal values","Profits","Religion"],"correct":[0,1,2,4],"explanation":"Пять детерминантов этики (determinants of ethics): Childhood, Culture, Personal values, Religion, Customs. «Profits» — это элемент triple bottom line (КСО), а НЕ детерминант этики (ловушка-смешение схем). Здесь пропущен Customs, но он не предложен среди вариантов.","difficulty":"medium"},{"id":"L3-32","concept":"ethics determinants","type":"single","question":"Which definition of 'ethics' is correct?","options":["accepted principles of right or wrong governing the conduct of business people","an individual's personal beliefs about whether actions are right or wrong","behavior that conforms to generally accepted social norms","a set of obligations to protect and enhance society","the collective programming of the mind"],"correct":[1],"explanation":"Верно: этика (ethics) — личные убеждения индивида о том, правильны действия или нет. Первый вариант — деловая этика (business ethics), третий — этичное поведение (ethical behavior) (близкие, но разные определения; ловушка-смешение). Четвёртый — КСО, пятый — культура.","difficulty":"medium"},{"id":"L3-33","concept":"ethical relativism vs imperialism","type":"single","question":"The slogan 'we set the rules' (imposing your own norms abroad) corresponds to:","options":["Ethical relativism","Ethical imperialism","The 'middle of the road' approach","Cross-cultural literacy","The defensive CSR stance"],"correct":[1],"explanation":"Верно: этический империализм (ethical imperialism) — «we set the rules», навязывание своих норм. Этический релятивизм (ethical relativism) — наоборот, «follow the others», принятие местных норм (ловушка-противоположный полюс). «Middle of the road» — рекомендуемая середина. Остальные — другие концепции.","difficulty":"easy"},{"id":"L3-34","concept":"ethical relativism vs imperialism","type":"multi","question":"The recommended 'middle of the road' approach to international ethics emphasizes respect for which of the following? Select ALL that apply.","options":["Human dignity and human rights","Local traditions","Institutional context","Maximizing short-term profit above all","Following local norms whatever they are"],"correct":[0,1,2],"explanation":"Подход «золотой середины» (middle of the road) уважает: человеческое достоинство и права человека, местные традиции, институциональный контекст. «Максимизация краткосрочной прибыли любой ценой» не входит. «Следовать местным нормам какими бы они ни были» — это этический релятивизм (ethical relativism), крайность, которую серединный путь как раз избегает (ловушка).","difficulty":"medium"},{"id":"L3-35","concept":"CSR / legitimacy","type":"single","question":"Corporate social responsibility (CSR) is defined as:","options":["a set of obligations a company undertakes to protect and enhance the society in which it functions along with the traditional economic gains it seeks","an individual's personal beliefs about whether actions are right or wrong","the gap between home and host values and norms","pretending to be sustainable for short-term gain","the uncodified social rules that prescribe appropriate behavior"],"correct":[0],"explanation":"Верно: КСО (CSR) — набор обязательств компании защищать и улучшать общество наряду с традиционными экономическими выгодами. Второй — этика, третий — культурная дистанция, четвёртый — гринвошинг, пятый — нормы (ловушки-смешения).","difficulty":"easy"},{"id":"L3-36","concept":"CSR / legitimacy","type":"single","question":"How does CSR function as a legitimacy strategy in international business?","options":["It eliminates cultural distance entirely","It reduces the liability of foreignness by building local legitimacy, but must fit local priorities","It replaces the need to comply with local laws","It guarantees performance-based compensation","It is identical to greenwashing"],"correct":[1],"explanation":"Верно: КСО снижает эффект чужеродности (liability of foreignness), создавая местную легитимность (legitimacy), но должна соответствовать местным приоритетам (образование, здравоохранение, экология, рабочие места, отношения с сообществом). Дистанцию она не «устраняет полностью», не заменяет законы, не связана с оплатой и НЕ равна гринвошингу (ловушка — гринвошинг это фальшивая КСО).","difficulty":"medium"},{"id":"L3-37","concept":"triple bottom line (people/planet/profit)","type":"multi","question":"Select ALL three pillars of the triple bottom line framework.","options":["People","Planet","Profits","Power","Productivity"],"correct":[0,1,2],"explanation":"Концепция тройного итога (triple bottom line) = три «P»: People (благополучие общества), Planet (защита природной среды), Profits (экономическая миссия, прибыль и ценность для стейкхолдеров). «Power» и «Productivity» — дистракторы, не входят в схему.","difficulty":"easy"},{"id":"L3-38","concept":"triple bottom line (people/planet/profit)","type":"single","question":"In the triple bottom line, the 'Planet' pillar refers to:","options":["fulfilling the economic mission and creating value for stakeholders","protecting the natural environment","enhancing the general welfare of society","complying with minimum legal requirements","the 17 UN Sustainable Development Goals"],"correct":[1],"explanation":"Верно: Planet — защита природной окружающей среды. Первый вариант — Profits (экономическая миссия), третий — People (благополучие общества) (ловушка-перепутывание трёх P). Соблюдение минимума закона — это защитная позиция КСО. SDG — отдельная рамка ориентиров.","difficulty":"medium"},{"id":"L3-39","concept":"CSR stances (obstructionist/defensive/accommodative/proactive)","type":"single","question":"Which CSR stance is characterized by 'legal compliance only' — meeting minimum legal requirements and admitting mistakes only when necessary?","options":["Obstructionist","Defensive","Accommodative","Proactive","Relativist"],"correct":[1],"explanation":"Верно: защитная позиция (defensive) — только соблюдение закона, минимум требований, фокус на прибыли, признание ошибок лишь при необходимости. Obstructionist — минимальное участие и отрицание ответственности; Accommodative — сверх требований закона; Proactive — полностью интегрированная КСО (ловушки-соседние позиции). «Relativist» не является позицией КСО.","difficulty":"medium"},{"id":"L3-40","concept":"CSR stances (obstructionist/defensive/accommodative/proactive)","type":"single","question":"Ordered from LEAST to MOST responsible, the four CSR stances are:","options":["Defensive → Obstructionist → Proactive → Accommodative","Obstructionist → Defensive → Accommodative → Proactive","Proactive → Accommodative → Defensive → Obstructionist","Accommodative → Proactive → Defensive → Obstructionist","Obstructionist → Accommodative → Defensive → Proactive"],"correct":[1],"explanation":"Верно: по нарастанию ответственности (Least → Most Responsible) — Obstructionist → Defensive → Accommodative → Proactive. Остальные варианты переставляют позиции (в т.ч. полностью обратный порядок) — ловушки на знание последовательности континуума.","difficulty":"medium"},{"id":"L3-41","concept":"greenwashing","type":"multi","question":"Select ALL items that are common greenwashing tactics.","options":["Vague or misleading claims","Hidden trade-offs","Lack of third-party verification","Exaggerated marketing","Independent audited sustainability reporting"],"correct":[0,1,2,3],"explanation":"Тактики гринвошинга (greenwashing): расплывчатые/вводящие в заблуждение заявления, скрытые компромиссы, отсутствие независимой проверки, преувеличенный маркетинг. «Независимая аудированная отчётность» — это как раз противоположность гринвошинга (наличие third-party verification), а не тактика (ловушка-инверсия).","difficulty":"medium"},{"id":"L3-42","concept":"greenwashing","type":"single","question":"Greenwashing is best defined as:","options":["a fully integrated CSR strategy seen as a core business value","pretending to be sustainable — short-term gain, long-term risk","meeting the minimum legal environmental requirements","the gap between home and host environmental norms","protecting the natural environment as part of the triple bottom line"],"correct":[1],"explanation":"Верно: гринвошинг (greenwashing) — притворяться устойчивым; краткосрочная выгода, долгосрочный риск (риски: потеря доверия, внимание регуляторов, репутационный ущерб). Первый вариант — проактивная КСО, третий — защитная позиция, четвёртый — экологическая дистанция, пятый — пилар Planet (ловушки-смешения).","difficulty":"easy"}],"open":[{"id":"L3-O1","concept":"Hofstede: power distance / individualism / uncertainty avoidance / indulgence","question":"Explain the six Hofstede dimensions. Then, given a country profile with high Power Distance, low Individualism, low Masculinity, high Uncertainty Avoidance, high Long-Term Orientation and low Indulgence, discuss how a manager should read such a profile, what it implies for international business, and what caveats apply when using cultural profiles.","model_answer":"Шесть измерений Хофстеде (Hofstede dimensions) — это шкалы между двумя полюсами: (1) Индивидуализм/Коллективизм (individualism/collectivism) — действия в личных интересах и слабосвязанная структура против абсолютной лояльности группе и тесносвязанной структуры; (2) Дистанция власти (power distance) — низкая/высокая степень принятия неравного распределения власти; (3) Принятие/Избегание неопределённости (uncertainty acceptance/avoidance); (4) Маскулинность/Фемининность (masculinity/femininity) — карьера/деньги/успех против work-life balance и отношений; (5) Долгосрочная/Краткосрочная ориентация (long/short-term orientation); (6) Потворство/Сдержанность (indulgence/restraint). Чтение профиля «высокий PDI, низкий IND, низкий MAS, высокий UAI, высокий LTO, низкий Indulgence»: высокая дистанция власти → уважение к авторитету, жёсткие иерархии, централизация решений; низкий индивидуализм → скорее коллективистская культура (организация важнее индивидуальной карьеры, низкая мобильность); низкая маскулинность → ближе к фемининному, кооперативному климату и ценности отношений; сильное избегание неопределённости → риск-аверсия, жёсткие правила, страх перемен; долгосрочная ориентация → прагматизм, упорство, фокус на будущем; низкий Indulgence → сдержанная (restraint) культура, самоконтроль и более жёсткие соц. нормы. Для МБ это значит: централизованные решения и уважение иерархии, акцент на стабильности и чётких правилах, выстраивание долгосрочных отношений и доверия. КЛЮЧЕВАЯ оговорка: культурные профили — НЕ стереотипы (culture profiles are not stereotypes); они не предсказывают конкретных людей, а дают типичные паттерны и вероятные точки трения, которые надо использовать как гипотезы для проверки, а не как фиксированные истины. Также важна критика Хофстеде: соответствие «культура=нация» один-к-одному, игнорирование внутристрановой гетерогенности, предвзятость выборки (исследование внутри одной IBM). (Конкретный пример страны/значений студент может привести по своему выбору, напр. профиль России: PDI≈93, UAI≈95, LTO≈81, низкие IND/MAS/Indulgence.)","model_points":["Перечислить все 6 измерений с обоими полюсами","Каждое — это шкала между полюсами, ни один не «главный»","Корректно прочитать заданный профиль: высокие PDI и UAI, долгосрочная ориентация, низкие IND/MAS/Indulgence (сдержанность)","Связать значения с implications for IB (иерархии, централизация, риск-аверсия, отношения)","Подчеркнуть: профили НЕ стереотипы, использовать как гипотезы","Упомянуть критику Хофстеде (культура=нация, гетерогенность, выборка IBM)"]},{"id":"L3-O2","concept":"high vs low context (Hall) / cross-cultural literacy","question":"Discuss Hall's high-context vs low-context distinction. Explain how the two poles differ in communication style and attitude toward contracts and trust, and how cultural distance and cross-cultural literacy relate to doing business across these cultures.","model_answer":"Контекстный подход (context approach) Эдварда и Милдред Холл различает культуры по тому, сколько смысла лежит «вокруг» слов. Low-context (низкоконтекстная) культура (Сев. Америка, Зап. Европа, Австралия): коммуникация явная (explicit), смысл буквально в словах; приоритет задач над отношениями (tasks > relationships); бизнес опирается на детальные контракты, индивидуальную ответственность, структурированные встречи, фактологичные сообщения, лидерство на задачах; доверяют подписанному контракту. High-context (высококонтекстная) культура (Азия, Ближний Восток, Латинская Америка): коммуникация подразумеваемая (implicit), половина смысла — в отношениях, статусе и невысказанном; приоритет отношений над задачами; доверие важнее контрактов, консенсусные решения, неформальные встречи, сторителлинг, лидерство на отношениях. Это два полюса ОДНОЙ оси, а не отдельные ярлыки. Связь с культурной дистанцией (cultural distance) — разрывом между ценностями/нормами home- и host-страны: чем дальше культуры (особенно вне родного кластера), тем выше риск недопонимания, координационные издержки, время на построение доверия и вероятность конфликта; дистанция — «топливо» эффекта чужеродности (liability of foreignness). Ответ менеджера — кросс-культурная грамотность (cross-cultural literacy): пройти аккультурацию (acculturation), не быть этноцентричным (ethnocentric), через личный опыт, тренинги, наём местных в host-странах, наём иностранцев дома, опытных менеджеров и литературу. Практически: с high-context партнёрами сначала строят отношения и доверие, а не давят контрактом; с low-context — наоборот фиксируют всё письменно.","model_points":["Авторы — Edward & Mildred Hall; это полюса одной оси","Low-context: explicit, tasks>relationships, детальные контракты, лидерство на задачах","High-context: implicit, relationships>tasks, доверие>контрактов, консенсус, сторителлинг","Привести регионы для каждого полюса","Связать с cultural distance и её последствиями (недопонимание, издержки, доверие, конфликт)","Cross-cultural literacy / acculturation / не быть ethnocentric + способы достижения"]},{"id":"L3-O3","concept":"ethical relativism vs imperialism / ethics determinants","question":"Explain the spectrum of ethics in international business between ethical relativism and ethical imperialism. Why is the 'middle of the road' approach recommended, and what are the determinants of ethics that shape an individual's beliefs?","model_answer":"Этика (ethics) — личные убеждения индивида о том, правильны действия или нет; часть неформальных институтов, отражается в формальных законах. В МБ этика выстраивается как двунаправленная шкала между двумя крайностями. Левый полюс — этический релятивизм (ethical relativism): «follow the others», принимай местные нормы как есть («когда в Риме…»). Правый полюс — этический империализм (ethical imperialism): «we set the rules», навязывай свои нормы. Обе крайности опасны: релятивизм оправдывает что угодно («тут так принято» — например, взятки), а империализм игнорирует местный контекст и злит принимающую сторону. Поэтому рекомендуется серединный путь (middle of the road): уважение к человеческому достоинству и правам человека, к местным традициям и институциональному контексту — то есть твёрдые базовые принципы (права человека) плюс гибкость к традициям. Важность этики в том, что этические вопросы — это вопросы легитимности (legitimacy): стейкхолдеры судят фирмы по справедливости, ответственности, прозрачности, уважению норм, и «нормальное локально» может быть неприемлемо глобально. Детерминанты этики (determinants of ethics), формирующие убеждения индивида (кольцо вокруг ETHICS) — пять источников: Childhood (детство), Culture (культура), Personal values (личные ценности), Religion (религия), Customs (обычаи). Управление этикой через границы требует соответствия и местным, и международным стандартам, через кодексы этики, этическое обучение, орг. практики и корпоративную культуру, ценящую этику.","model_points":["Релятивизм = 'follow the others' (левый полюс), империализм = 'we set the rules' (правый полюс)","Обе крайности опасны — объяснить почему","Middle of the road: уважение к human dignity/rights, local traditions, institutional context","Связь с легитимностью: 'normal locally can be unacceptable globally'","5 детерминантов: Childhood, Culture, Personal values, Religion, Customs","Инструменты управления этикой: кодексы, обучение, корп. культура; местные + международные стандарты"]},{"id":"L3-O4","concept":"CSR stances / triple bottom line / greenwashing / CSR legitimacy","question":"Explain CSR as a legitimacy strategy. Describe the triple bottom line, the four CSR stances from least to most responsible, and what greenwashing is (its tactics and risks). Illustrate greenwashing with an example of your choice.","model_answer":"КСО (corporate social responsibility) — набор обязательств компании защищать и улучшать общество, в котором она функционирует, наряду с традиционными экономическими выгодами. Как стратегия легитимности (legitimacy) КСО снижает эффект чужеродности (liability of foreignness), создавая местную легитимность — но должна соответствовать местным приоритетам (образование, здравоохранение, экология, рабочие места, отношения с сообществом). Концепция тройного итога (triple bottom line) — три пересекающихся круга, три «P»: Profits (экономическая миссия — прибыль и ценность для стейкхолдеров), Planet (защита природной среды), People (повышение благополучия общества); КСО = устойчивое сочетание всех трёх (зона пересечения), рамка глобальных ориентиров — 17 ЦУР ООН (SDGs). Четыре позиции КСО по нарастанию ответственности (Least → Most Responsible): (1) Obstructionist (обструкционистская) — минимальное участие, отрицает ответственность, избегает соц./эко-вопросов, может прибегать к неэтичным практикам; (2) Defensive (защитная) — только соблюдение закона, фокус на прибыли, признаёт ошибки лишь при необходимости; (3) Accommodative (приспособленческая) — сверх требований закона, добровольно участвует (благотворительность, соцпрограммы), но без инициативы; (4) Proactive (проактивная) — полностью интегрированная стратегия, активно ищет, как принести пользу, КСО = ключевая бизнес-ценность. Гринвошинг (greenwashing) — притворяться устойчивым (краткосрочная выгода, долгосрочный риск); тактики: расплывчатые/вводящие в заблуждение заявления, скрытые компромиссы, отсутствие независимой проверки, преувеличенный маркетинг; риски: потеря доверия потребителей, внимание регуляторов, репутационный ущерб. Гринвошинг — это proactive-видимость при obstructionist/defensive-реальности. В качестве иллюстрации можно привести любой подходящий пример по выбору студента (напр. фэшн-ритейлер, заявляющий завышенную долю «устойчивых материалов» и навешивающий «зелёные» метки, что обернулось исками и расследованиями за вводящие в заблуждение утверждения).","model_points":["Определение КСО и её роль как стратегии легитимности (снижение liability of foreignness, fit local priorities)","Triple bottom line: Profits, Planet, People — расшифровать каждый и что КСО = пересечение трёх","Четыре позиции по порядку Least→Most: Obstructionist → Defensive → Accommodative → Proactive с ключевой чертой каждой","Гринвошинг: определение (pretending to be sustainable, short-term gain/long-term risk)","Тактики и риски гринвошинга","Привести любой корректный пример гринвошинга (конкретный кейс — на выбор студента)"]}]},{"topic":"Международный менеджмент — Лекция 4: Международная стратегия и организация","mcq":[{"id":"L4-01","concept":"strategy / international strategic management","type":"single","difficulty":"easy","question":"Which statement best defines 'strategy'?","options":["An integrated and coordinated set of commitments and actions designed to exploit core competencies and gain a competitive advantage","A comprehensive and ongoing management planning process aimed at formulating and implementing strategies internationally","The formal division of the organization into sub-units to coordinate activities","A device used to reward appropriate managerial behavior tied to performance metrics"],"correct":[0],"explanation":"Верно A — определение стратегии (strategy): «integrated and coordinated set of commitments and actions… to exploit core competencies and gain a competitive advantage». B — это определение международного стратегического менеджмента (international strategic management), не самой стратегии. C — горизонтальная дифференциация (horizontal differentiation). D — стимулы (incentives). Классическая ловушка: подмена «strategy» на «international strategic management»."},{"id":"L4-02","concept":"strategy / international strategic management","type":"single","difficulty":"medium","question":"International strategic management is defined as a comprehensive and ongoing management planning process aimed at which two activities?","options":["Formulating and implementing strategies to compete effectively internationally","Centralizing and decentralizing decision-making responsibilities","Adapting and aggregating offerings across countries","Recruiting and retaining people that bring value to the organization"],"correct":[0],"explanation":"Верно A — международный стратегический менеджмент нацелен на формулирование (formulating) и реализацию (implementing) стратегий для эффективной международной конкуренции. B — про вертикальную дифференциацию ((де)централизацию). C — два из трёх «A» модели Гемавата. D — про people. Ловушка: смешать «formulating/implementing» с другими парными концепциями лекции."},{"id":"L4-03","concept":"3 sources of competitiveness and trade-off","type":"multi","difficulty":"medium","question":"Select ALL items that belong under 'Global efficiencies' as a source of international competitiveness.","options":["Location economies","Economies of scale","Economies of scope","Knowledge transfer among MNEs' subsidiaries","Cross-country differences"],"correct":[0,1,2],"explanation":"Верно A, B, C — глобальная эффективность (global efficiencies) включает экономию от размещения (location economies), эффект масштаба (economies of scale) и эффект разнообразия/охвата (economies of scope). D (knowledge transfer) относится к глобальному обучению (worldwide learning). E (cross-country differences) относится к мультинациональному соответствию (multinational fit). Ловушка: economies of scale vs scope — обе входят в global efficiencies, обе верны."},{"id":"L4-04","concept":"3 sources of competitiveness and trade-off","type":"single","difficulty":"medium","question":"What is the key trade-off among the three sources of international competitiveness?","options":["A firm cannot maximize global efficiencies, multinational fit and worldwide learning simultaneously; it must prioritize under constraints","A firm must always maximize global efficiencies first, then worldwide learning","Multinational fit and worldwide learning are mutually exclusive and cannot coexist","Global efficiencies automatically guarantee both multinational fit and worldwide learning"],"correct":[0],"explanation":"Верно A — нельзя максимизировать все три источника сразу: «prioritize under constraints». Именно из этого компромисса (trade-off) вырастают 4 стратегии и модель AAA. B неверно — нет фиксированного приоритета. C неверно — они не взаимоисключающие, просто нельзя максимизировать всё сразу. D неверно — эффективность не гарантирует автоматически остальное."},{"id":"L4-05","concept":"integration vs responsiveness pressures","type":"single","difficulty":"easy","question":"In the integration–responsiveness framework, the 'pressure for cost reduction' corresponds to which goal?","options":["Global efficiency","Local responsiveness","Worldwide learning","Multinational fit"],"correct":[0],"explanation":"Верно A — давление на снижение издержек (pressure for cost reduction) = глобальная эффективность (global efficiency). B (local responsiveness) — это второе, отдельное давление (адаптация к различиям стран). C и D — другие источники конкурентоспособности, не «давления» в матрице 2×2. Ловушка: спутать два давления между собой."},{"id":"L4-06","concept":"integration vs responsiveness pressures","type":"multi","difficulty":"hard","question":"Select ALL conditions under which the pressure for cost reduction is strong.","options":["Products are commodity-like, serving universal needs with little scope for differentiation","Price is the main competitive weapon and margins are thin","Major competitors are based in low-cost locations or use highly efficient global value chains","Consumer tastes and preferences differ strongly across countries","Distribution channels differ across countries"],"correct":[0,1,2],"explanation":"Верно A, B, C — условия сильного давления на издержки (commodity-like продукты, цена как главное оружие и тонкая маржа, конкуренты в low-cost локациях / эффективные глобальные цепочки). D и E относятся к давлению на локальную реактивность (local responsiveness), а НЕ к давлению на издержки. Ловушка: перепутать факторы двух разных давлений."},{"id":"L4-07","concept":"integration vs responsiveness pressures","type":"multi","difficulty":"medium","question":"Select ALL factors that drive the pressure for local responsiveness.","options":["Consumer tastes and preferences","Traditional practices and infrastructure","Distribution channels","Economic and political demands of host governments","Ability to scale technology globally without adaptation"],"correct":[0,1,2,3],"explanation":"Верно A, B, C, D — факторы локальной реактивности (local responsiveness): вкусы потребителей, традиции и инфраструктура, каналы дистрибуции, требования принимающих правительств (host governments). E (масштабируемость технологии без адаптации) — это, наоборот, фактор давления на издержки. Ловушка: E звучит правдоподобно, но относится к другому давлению."},{"id":"L4-08","concept":"home replication strategy","type":"single","difficulty":"easy","question":"Which main idea best captures the Home Replication strategy?","options":["What works at home will work abroad","Treat each country as distinct and adapt to local needs","Treat the world as one (or a few) large markets","Simultaneously benefit from global efficiencies, multinational flexibility and worldwide learning"],"correct":[0],"explanation":"Верно A — девиз Home Replication: «What works at home will work abroad». B — Localization. C — Global standardization. D — Transnational. Ловушка: все четыре девиза похожи по форме; нужно помнить, какой к какой стратегии относится."},{"id":"L4-09","concept":"home replication strategy","type":"multi","difficulty":"medium","question":"Select ALL advantages of the Home Replication strategy.","options":["Leverages home-based competencies in foreign markets","Relatively easy to implement, low coordination costs","Useful as the first stage of internationalisation","Strong relational fit with local consumers and institutions","Low unit costs through scale and experience"],"correct":[0,1,2],"explanation":"Верно A, B, C — преимущества Home Replication: использует домашние компетенции, легко внедрить с низкими издержками координации, хороша как первая стадия интернационализации. D — преимущество Localization. E — преимущество Global standardization. Ловушка: подставить плюсы других стратегий."},{"id":"L4-10","concept":"localization strategy","type":"multi","difficulty":"medium","question":"Select ALL disadvantages of the Localization strategy.","options":["Subsidiaries have too much power and autonomy in host countries","High duplication of activities (multiple R&D, marketing teams) raising costs and complexity","Risk of brand becoming fragmented across markets with fewer global scale benefits","Too much centralized control","Lack of local responsiveness"],"correct":[0,1,2],"explanation":"Верно A, B, C — минусы Localization: избыточная автономия дочерних компаний, дублирование функций (R&D, маркетинг) → выше издержки, фрагментация бренда и потеря выгод масштаба. D (избыточный централизованный контроль) — минус Global standardization. E (нет локальной реактивности) — минус Home replication и Global standardization, но НЕ локализации (она как раз сильна в реактивности). Ловушка: E противоречит сути локализации."},{"id":"L4-11","concept":"localization strategy","type":"single","difficulty":"medium","question":"Which set of industries is most likely to follow a Localization strategy (high local responsiveness, low cost pressure)?","options":["Food & beverage, cosmetics, retail banking, media, fashion","Semiconductors, commercial aircraft, industrial components","Oil refining, mining, steel production","Cloud computing and search engines with a single universal product"],"correct":[0],"explanation":"Верно A — отрасли, где вкусы, культура и регулирование сильно различаются по странам, тяготеют к локализации (Localization): продукты питания и напитки, косметика, розничный банкинг, медиа, мода. B — отрасли с сильным давлением масштаба и слабой реактивностью → глобальная стандартизация (global standardization). C — также давление на издержки/масштаб. D — универсальный продукт без адаптации = тоже не локализация. Суть: распознать высокую локальную реактивность по характеру спроса, а не запоминать конкретный список."},{"id":"L4-12","concept":"global standardization strategy","type":"single","difficulty":"medium","question":"The Global Standardization strategy is positioned in which quadrant of the integration–responsiveness matrix?","options":["High cost reduction pressure / Low local responsiveness","Low cost reduction pressure / Low local responsiveness","Low cost reduction pressure / High local responsiveness","High cost reduction pressure / High local responsiveness"],"correct":[0],"explanation":"Верно A — глобальная стандартизация (global standardization) в верх-левом квадранте: высокое давление на издержки, низкая локальная реактивность. B — Home replication. C — Localization. D — Transnational. Ловушка: спутать с Transnational (тоже высокое давление на издержки, но там высокая реактивность)."},{"id":"L4-13","concept":"global standardization strategy","type":"multi","difficulty":"medium","question":"Select ALL advantages of the Global Standardization strategy.","options":["Low unit costs through scale and experience","Consistent global brand and product offering","Easier global coordination of R&D and production","Strong relational fit with local consumers","Both cost-effective and locally responsive"],"correct":[0,1,2],"explanation":"Верно A, B, C — плюсы Global standardization: низкие удельные издержки за счёт масштаба и опыта, единый глобальный бренд/продукт, проще координировать R&D и производство. D — плюс Localization. E — плюс Transnational. Ловушка: E звучит идеально, но это про транснациональную стратегию."},{"id":"L4-14","concept":"transnational strategy","type":"multi","difficulty":"hard","question":"Select ALL disadvantages of the Transnational strategy.","options":["Very complex to implement with high coordination demands","Requires sophisticated organisational structures","Tension between global and local managers over who decides what","Lack of local responsiveness","Cannot leverage global learning or diffusion of innovations"],"correct":[0,1,2],"explanation":"Верно A, B, C — минусы Transnational: очень сложна, высокие требования к координации, нужны сложные оргструктуры, конфликт глобальных и локальных менеджеров о полномочиях. D неверно — транснациональная как раз ВЫСОКО реактивна. E неверно — её плюс именно в глобальном обучении и диффузии инноваций. Ловушка: D и E — прямые противоположности её сильных сторон."},{"id":"L4-15","concept":"transnational strategy / evolution of strategy","type":"single","difficulty":"medium","question":"According to the 'Evolution of strategy', what happens to Home Replication and Localization strategies as competition in the market emerges?","options":["They become less viable, and firms are pushed toward the transnational strategy","They become more profitable due to first-mover advantages","They merge into a single global standardization strategy","They remain optimal regardless of competitive intensity"],"correct":[0],"explanation":"Верно A — «угловые» простые стратегии (Home replication, Localization) теряют жизнеспособность по мере роста конкуренции; растут оба давления, и фирмы вытесняются к транснациональной (transnational) стратегии. B, C, D противоречат логике эволюции стратегии (evolution of strategy)."},{"id":"L4-16","concept":"AAA: adaptation","type":"single","difficulty":"medium","question":"In Ghemawat's AAA model, the Adaptation approach is associated with which value and which related international strategy?","options":["Local responsiveness; similar to localization strategy","Economies of scale; similar to global standardization strategy","Leveraging on differences; similar to localization strategy","Knowledge transfer; similar to home replication strategy"],"correct":[0],"explanation":"Верно A — узел Adaptation = «local responsiveness», прямо «similar to localization strategy». B описывает Aggregation. C смешивает: «leveraging on differences» — это Arbitrage. D — выдуманная привязка. Ловушка: спутать привязки A↔стратегия (Adaptation↔Localization, Aggregation↔Global standardization)."},{"id":"L4-17","concept":"AAA: aggregation","type":"multi","difficulty":"hard","question":"Select ALL statements that correctly describe Aggregation in Ghemawat's AAA model.","options":["Its goal is economies of scale and scope by grouping countries and treating them more similarly","It is similar to the global standardization strategy","Levers include regional strategies and global product platforms with limited variants","Its core aim is to exploit wage and tax differences by relocating activities","It accepts cross-country differences and modifies products to match them"],"correct":[0,1,2],"explanation":"Верно A, B, C — агрегация (aggregation): цель — economies of scale and scope через группировку стран, похожа на global standardization, рычаги — региональные стратегии и глобальные продуктовые платформы. D описывает Arbitrage (использование разницы зарплат/налогов). E описывает Adaptation (принятие различий и модификация продукта). Ловушка: смешать три «A»."},{"id":"L4-18","concept":"AAA: arbitrage","type":"single","difficulty":"medium","question":"What is the core idea of Arbitrage in Ghemawat's AAA model?","options":["Exploit differences across countries to create value, rather than eliminate them","Eliminate cross-country differences by standardizing the product globally","Modify products and business models to match local differences","Group countries into regions to achieve economies of scale"],"correct":[0],"explanation":"Верно A — арбитраж (arbitrage) = эксплуатировать различия (зарплаты, налоги, ресурсы, навыки, регулирование, часовые пояса) ради создания ценности, а не устранять их. B неверно — арбитраж различия не устраняет. C — это Adaptation. D — это Aggregation. Ключевое отличие арбитража: он про РАЗМЕЩЕНИЕ деятельности, а не про адаптацию или масштаб продукта."},{"id":"L4-19","concept":"AAA: arbitrage","type":"multi","difficulty":"medium","question":"Select ALL types of arbitrage levers in the AAA model.","options":["Labour arbitrage","Resource arbitrage","Capital/tax arbitrage","Knowledge arbitrage","Brand arbitrage"],"correct":[0,1,2,3],"explanation":"Верно A, B, C, D — арбитраж работает через трудовой (labour), ресурсный (resource), капитальный/налоговый (capital/tax) и знаниевый (knowledge) рычаги. E (brand arbitrage) — выдуманный дистрактор, такого типа арбитража нет. Ловушка: «бренд» не является измерением межстрановой разницы условий."},{"id":"L4-20","concept":"organizational architecture (5 elements)","type":"multi","difficulty":"medium","question":"According to Hill & Hult (2019), select ALL elements of organizational architecture (the four surrounding elements around People).","options":["Organizational structure","Processes","Incentives and control","Organizational culture","Competitive advantage"],"correct":[0,1,2,3],"explanation":"Верно A, B, C, D — четыре элемента вокруг центрального PEOPLE: оргструктура (organizational structure), процессы (processes), стимулы и контроль (incentives and control), оргкультура (organizational culture). E (competitive advantage) — это цель стратегии, не элемент архитектуры. Ловушка: добавить стратегический термин из другой части лекции."},{"id":"L4-21","concept":"vertical differentiation (centralization vs decentralization)","type":"multi","difficulty":"hard","question":"Select ALL advantages of CENTRALIZATION in vertical differentiation.","options":["Facilitates coordination and integration of operations","Ensures decisions are consistent with corporate goals","Avoids duplication of activities","Increases motivation of lower-level managers","Ensures greater organizational flexibility and responsiveness"],"correct":[0,1,2],"explanation":"Верно A, B, C — плюсы централизации (centralization): координация/интеграция операций, согласованность решений с корпоративными целями, избегание дублирования (плюс поддержка крупных оргизменений). D и E — это плюсы децентрализации (decentralization): рост мотивации и гибкость/реактивность. Ловушка: перепутать плюсы централизации и децентрализации."},{"id":"L4-22","concept":"horizontal differentiation (4 structure types)","type":"single","difficulty":"medium","question":"Which organizational structure is a two-dimensional horizontal differentiation (product division and geographic area) with a dual hierarchy?","options":["Global matrix","Worldwide product division","Worldwide area division","International division"],"correct":[0],"explanation":"Верно A — глобальная матрица (global matrix): двумерная горизонтальная дифференциация продукт × регион, двойная иерархия (dual hierarchy), даёт гибкость, но трудно реализовать («question of authority»). B, C — одномерные дивизиональные структуры. D — начальная структура. Ловушка: спутать матрицу с одномерными продуктовой/региональной структурами."},{"id":"L4-23","concept":"international division -> home replication","type":"single","difficulty":"easy","question":"The international division structure is the typical initial structure, effective at low foreign sales, and best fits which strategy?","options":["Home replication","Localization","Global standardization","Transnational"],"correct":[0],"explanation":"Верно A — international division: типичная начальная структура, эффективна при низком уровне зарубежных продаж, риск конфликтов координации, fits with home replication strategy. Остальные структуры соответствуют другим стратегиям (area→localization, product→global standardization, matrix→transnational)."},{"id":"L4-24","concept":"worldwide area division -> localization","type":"multi","difficulty":"medium","question":"Select ALL statements that correctly describe the worldwide area division structure.","options":["Based on division into geographic areas","Area divisions are highly autonomous entities with decentralized decision-making","Facilitates local responsiveness and fits the localization strategy","Accommodates a high degree of product diversification","Relies on a dual hierarchy of product and area"],"correct":[0,1,2],"explanation":"Верно A, B, C — worldwide area division: деление по географии, автономные регионы с децентрализацией, усиливает локальную реактивность, fits localization. D описывает worldwide product division (высокая диверсификация). E описывает global matrix (двойная иерархия). Ловушка: смешать признаки area/product/matrix структур."},{"id":"L4-25","concept":"worldwide product division -> global standardization","type":"single","difficulty":"medium","question":"Which structure accommodates a high degree of diversification, uses highly autonomous product divisions, overcomes coordination problems but lacks local responsiveness?","options":["Worldwide product division (fits global standardization)","Worldwide area division (fits localization)","International division (fits home replication)","Global matrix (fits transnational)"],"correct":[0],"explanation":"Верно A — worldwide product division: при высокой диверсификации, автономные продуктовые дивизионы, решает проблему координации, но не хватает локальной реактивности; fits global standardization. B даёт как раз локальную реактивность. C — начальная структура. D — двумерная матрица. Ловушка: «lack of local responsiveness» — отличительный признак именно продуктовой структуры."},{"id":"L4-26","concept":"global matrix -> transnational; organization-strategy fit table","type":"single","difficulty":"hard","question":"In the organization–strategy fit table, which architecture configuration is correct for the Transnational strategy?","options":["Mixed centralization and decentralization; global matrix; very high interdependence and cost of control","Centralization; worldwide product division; high (but not very high) interdependence","Decentralization; worldwide area division; low cost of control","Centralization; international division; moderate interdependence"],"correct":[0],"explanation":"Верно A — Transnational: смешанная (де)централизация, global matrix, «очень высокие» (very high) взаимозависимость (interdependence) и стоимость контроля (cost of control) — самая сложная конфигурация. B описывает Global standardization (централизация, worldwide product division, interdependence именно «high», структура продуктовая). C — Localization. D — Home replication. Ловушка: подставить конфигурацию соседней стратегии из той же таблицы; ключевой различитель Transnational — матрица и уровень «very high»."},{"id":"L4-27","concept":"integrating mechanisms (formal/informal)","type":"multi","difficulty":"medium","question":"Select ALL mechanisms classified as FORMAL integrating mechanisms.","options":["Direct contact","Liaison roles","Temporary or permanent teams","Matrix structure","Knowledge networks"],"correct":[0,1,2,3],"explanation":"Верно A, B, C, D — формальные механизмы интеграции (formal integrating mechanisms): прямой контакт (direct contact), роли-связные (liaison roles), временные/постоянные команды, матричная структура. E (knowledge networks) — это НЕформальный механизм (informal integrating mechanism), наряду с неформальными связями сотрудничества. Ловушка: knowledge networks звучит «структурно», но отнесён к informal."},{"id":"L4-28","concept":"control types (personal/bureaucratic/output/cultural)","type":"single","difficulty":"medium","question":"Which control type is defined as 'control achieved through a system of rules and procedures'?","options":["Bureaucratic control","Personal control","Output control","Cultural control"],"correct":[0],"explanation":"Верно A — бюрократический контроль (bureaucratic control) = через систему правил и процедур. B (personal control) — через личный контакт с подчинёнными. C (output control) — постановка целей в объективных метриках результативности. D (cultural control) — через сильную корпоративную культуру. Ловушка: спутать четыре типа контроля по их определениям."},{"id":"L4-29","concept":"interdependence -> performance ambiguity -> cost of control","type":"single","difficulty":"medium","question":"Which sequence correctly represents the 'load' chain among these organizational variables?","options":["Interdependence -> performance ambiguity -> cost of control","Cost of control -> interdependence -> performance ambiguity","Performance ambiguity -> cost of control -> interdependence","Interdependence -> cost of control -> performance ambiguity"],"correct":[0],"explanation":"Верно A — цепочка: ВЗАИМОЗАВИСИМОСТЬ (interdependence) → НЕОДНОЗНАЧНОСТЬ ОЦЕНКИ (performance ambiguity) → СТОИМОСТЬ КОНТРОЛЯ (cost of control); все три растут вместе. Чем сильнее взаимозависимость подразделений, тем труднее объективно оценить вклад (растёт ambiguity) и тем дороже контроль. B, C, D переставляют звенья в неверном порядке."}],"open":[{"id":"L4-O1","concept":"3 sources of competitiveness and trade-off; integration vs responsiveness; 4 strategies","question":"Explain the three sources of international competitiveness and the trade-off among them. Discuss how this trade-off, combined with the integration–responsiveness pressures, gives rise to the four international business strategies. Illustrate the quadrants with examples of your choice.","model_answer":"Три источника международной конкурентоспособности (sources of international competitiveness): глобальная эффективность (global efficiencies — location economies, economies of scale, economies of scope); мультинациональное соответствие (multinational fit — использование cross-country differences и возможностей меняющейся среды); глобальное обучение (worldwide learning — обучение на различиях и knowledge transfer между подразделениями МНК). Ключевой компромисс (trade-off): фирма НЕ может максимизировать все три одновременно — «prioritize under constraints». Этот компромисс проявляется в двух фундаментальных давлениях отрасли: давление на снижение издержек (pressure for cost reduction = global efficiency) и давление на локальную реактивность (pressure for local responsiveness = адаптация к различиям). Сочетание этих давлений (матрица 2×2) задаёт 4 стратегии: низкие оба → Home replication; высокая реактивность/низкие издержки → Localization; высокие издержки/низкая реактивность → Global standardization; высокие оба → Transnational, пытающаяся совместить эффективность, гибкость и обучение ценой высокой сложности координации. Любые корректные примеры по квадрантам (на выбор студента) допустимы.","model_points":["Назвать 3 источника: global efficiencies (location economies, scale, scope), multinational fit (cross-country differences), worldwide learning (knowledge transfer)","Сформулировать trade-off: нельзя максимизировать всё сразу, prioritize under constraints","Связать с двумя давлениями: cost reduction = global efficiency, local responsiveness = адаптация","Матрица 2×2 и 4 стратегии по квадрантам (примеры на выбор студента)","Transnational как попытка совместить всё ценой сложности"]},{"id":"L4-O2","concept":"AAA: adaptation/aggregation/arbitrage","question":"Discuss Ghemawat's AAA model. Explain each of the three approaches (Adaptation, Aggregation, Arbitrage), how the first two map onto the four IB strategies, and why Arbitrage stands apart.","model_answer":"Модель AAA Гемавата (Ghemawat, HBR 2007) — три способа работы с межстрановыми различиями (треугольник): Adaptation, Aggregation, Arbitrage. Adaptation (адаптация) — узел «local responsiveness»: цель — рост выручки/доли через подгонку предложения под локальные различия (нужды, регулирование, культура, инфраструктура); модифицирует продукт/маркетинг/операции/организацию; прямо «similar to localization strategy». Aggregation (агрегация) — узел «economies of scale»: цель — economies of scale and scope через группировку стран в регионы/сегменты и более стандартизированное предложение (региональные стратегии, глобальные продуктовые платформы); «similar to global standardization strategy». Arbitrage (арбитраж) — узел «leveraging on differences»: эксплуатировать различия (зарплаты, налоги, ресурсы, навыки, регулирование, часовые пояса), а не устранять их, размещая деятельность там, где она эффективнее (labour/resource/capital-tax/knowledge arbitrage). Связки: Adaptation↔Localization, Aggregation↔Global standardization. Arbitrage стоит особняком: это не про адаптацию или масштаб ПРОДУКТА, а про географическое РАЗМЕЩЕНИЕ деятельности ради разницы условий. Как и с источниками конкурентоспособности, фирма не может одинаково сильно тянуть во все три вершины и выбирает 1–2 «A».","model_points":["Adaptation = local responsiveness, ≈ localization, модификация продукта/сервиса под различия","Aggregation = economies of scale/scope, ≈ global standardization, кластеризация стран/регионов","Arbitrage = leveraging on differences, размещение деятельности (labour/resource/capital-tax/knowledge)","Привязки: Adaptation↔Localization, Aggregation↔Global standardization","Почему Arbitrage особняком: про размещение, а не адаптацию/масштаб продукта; нельзя максимизировать все три"]},{"id":"L4-O3","concept":"organizational architecture; horizontal/vertical differentiation; organization-strategy fit","question":"Explain the concept of organization–strategy fit. Using the fit logic, describe how organizational architecture (vertical differentiation, horizontal structure, integrating mechanisms, control burden) should differ between a firm pursuing Localization and a firm pursuing the Transnational strategy.","model_answer":"Соответствие (fit) нужно на трёх уровнях одновременно: external fit to context (организация ↔ давления среды), organization–strategy fit (архитектура поддерживает стратегию), internal fit of organizational elements (внутренняя согласованность структуры, процессов, стимулов/контроля, людей, культуры). Несоответствие (misfit) разрушает результат. Localization: вертикальная дифференциация — децентрализация (decentralization); горизонтальная — worldwide area division (автономные географические дивизионы → локальная реактивность); integrating mechanisms — отсутствуют (None); взаимозависимость (interdependence), неоднозначность оценки (performance ambiguity) и стоимость контроля (cost of control) — низкие (Low). Transnational: вертикальная дифференциация — смешанная (mixed centralization and decentralization); горизонтальная — global matrix (продукт × регион, dual hierarchy); integrating mechanisms — очень много (a lot); взаимозависимость, performance ambiguity и cost of control — очень высокие (very high). То есть к более интегрированным стратегиям потребность в координации и контроле резко растёт; локализация — самая «лёгкая» конфигурация, транснациональная — самая сложная.","model_points":["Три уровня fit: external to context, organization–strategy, internal fit of elements; misfit разрушает результат","Localization: decentralization, worldwide area division, integrating mechanisms None, interdependence/ambiguity/cost of control Low","Transnational: mixed (de)centralization, global matrix (dual hierarchy), a lot of integrating mechanisms, всё very high","Закономерность: координация/interdependence/ambiguity/cost of control растут к интегрированным стратегиям","Структура подбирается под стратегию (horizontal differentiation fits strategy)"]},{"id":"L4-O4","concept":"integrating mechanisms; control types; interdependence -> performance ambiguity -> cost of control","question":"Explain the relationship between interdependence, performance ambiguity, and cost of control across the four IB strategies, and discuss how integrating mechanisms and control system types support coordination as strategy demands grow.","model_answer":"Нагрузочная цепочка: INTERDEPENDENCE (взаимозависимость подразделений) → PERFORMANCE AMBIGUITY (неоднозначность оценки результатов) → COST OF CONTROL (стоимость контроля) — все три растут вместе. По стратегиям нагрузка возрастает: минимум у Localization (всё Low), далее Home replication (Moderate), Global standardization (High), максимум у Transnational (Very high). Чем сильнее взаимозависимость, тем труднее объективно оценить вклад подразделения (растёт ambiguity), и тем дороже контроль. Параллельно растёт потребность в координации, поэтому integrating mechanisms усиливаются в том же порядке (Localization None < Home replication Few < Global standardization Many < Transnational A lot). Механизмы координации: формальные (direct contact, liaison roles, временные/постоянные команды, матричная структура) и неформальные (knowledge networks, неформальные связи сотрудничества). Контроль реализуется через 4 типа систем: personal control (через личный контакт), bureaucratic control (через правила и процедуры), output control (через объективные метрики результативности) и cultural control (через сильную корпоративную культуру). При высокой взаимозависимости и ambiguity (Transnational) объективные output-метрики работают хуже, и сильнее опираются на cultural и personal control, поддержанные плотными integrating mechanisms.","model_points":["Цепочка: interdependence → performance ambiguity → cost of control, растут вместе","Порядок по стратегиям: Localization (Low) < Home replication (Moderate) < Global standardization (High) < Transnational (Very high)","Integrating mechanisms растут в том же порядке (None < Few < Many < A lot); формальные (direct contact, liaison, teams, matrix) и неформальные (knowledge networks)","4 типа контроля: personal, bureaucratic, output, cultural — с определениями","Высокая ambiguity подрывает output control → опора на cultural/personal control"]}]},{"topic":"Lecture 5 — Functions of International Business (Global HR, R&D, Marketing, Operations)","mcq":[{"id":"L5-01","concept":"fit principle (strategy drives functions)","type":"single","question":"According to the 'Fit' principle, most international business failures are primarily caused by:","options":["Choosing the wrong country to enter","A misfit between strategy, structure, and functions","Insufficient financial capital for foreign expansion","Poor exchange-rate hedging"],"correct":[1],"explanation":"Верно (b): большинство провалов в МБ вызвано не выбором страны, а рассогласованием (misfit) между стратегией, структурой и функциями. (a) — именно это отрицается: дело не в неверной стране. (c) и (d) не названы причиной провала в логике fit.","difficulty":"easy"},{"id":"L5-02","concept":"fit principle (strategy drives functions)","type":"multi","question":"Per the 'Fit' principle, each function must fit which of the following? Select ALL that apply.","options":["Industry pressures (cost reduction vs local responsiveness)","Entry mode (control vs partnership)","Organization design (who owns decisions)","The CEO's personal leadership style","Quarterly stock-price targets"],"correct":[0,1,2],"explanation":"Верно (a,b,c): функции должны соответствовать (fit) трём вещам — отраслевым давлениям (industry pressures: снижение издержек vs локальная отзывчивость), способу входа (entry mode: контроль vs партнёрство) и оргдизайну (кто решает). (d) и (e) — правдоподобные дистракторы, к объектам fit не относятся.","difficulty":"medium"},{"id":"L5-03","concept":"staffing: ethnocentric/polycentric/geocentric","type":"single","question":"An 'ethnocentric staffing approach' requires that:","options":["All key management positions are filled by home-country nationals","Host-country nationals manage subsidiaries while home-country nationals hold HQ positions","The best people fill key jobs regardless of nationality","Each subsidiary independently sets its own staffing rules"],"correct":[0],"explanation":"Верно (a): этноцентрический (ethnocentric) подход — все ключевые управленческие позиции занимают граждане страны происхождения (home-country nationals). (b) — это полицентрический (polycentric). (c) — геоцентрический (geocentric). (d) не соответствует ни одному из трёх определений.","difficulty":"easy"},{"id":"L5-04","concept":"staffing: ethnocentric/polycentric/geocentric","type":"multi","question":"Which statements about the POLYCENTRIC staffing approach are correct? Select ALL that apply.","options":["Host-country nationals are recruited to manage subsidiaries","It overcomes cultural myopia","It is inexpensive to implement because no expatriate managers are sent","It seeks the best people regardless of nationality","It can lead to cultural myopia"],"correct":[0,1,2],"explanation":"Верно (a,b,c): полицентрический подход набирает граждан принимающей страны (host-country nationals) для управления дочками, преодолевает культурную близорукость (cultural myopia) и дёшев, т.к. экспатов не направляют. (d) — это геоцентрический подход (ловушка). (e) неверно: культурную близорукость порождает именно ЭТНОцентрический подход.","difficulty":"medium"},{"id":"L5-05","concept":"staffing: ethnocentric/polycentric/geocentric","type":"single","question":"A disadvantage UNIQUE to the geocentric staffing approach (vs the other two) is that:","options":["It strengthens corporate culture","National immigration policies may limit its implementation","It causes resentment of host-country nationals","It isolates HQ from foreign subsidiaries"],"correct":[1],"explanation":"Верно (b): минус геоцентрического подхода — иммиграционная политика стран может ограничить внедрение (плюс дороговизна). (a) — это преимущество, а не минус. (c) — минус этноцентрического (недовольство местных). (d) — минус полицентрического (изоляция HQ от дочек).","difficulty":"medium"},{"id":"L5-06","concept":"staffing approach mapped to strategy","type":"single","question":"In the staffing-approach-to-strategy fit, the GEOCENTRIC approach fits which IB strategy/strategies?","options":["Home replication only","Localization only","Global standardization AND Transnational","Home replication AND Localization"],"correct":[2],"explanation":"Верно (c): геоцентрический подход соответствует сразу двум стратегиям — глобальной стандартизации (global standardization) и транснациональной (transnational). (a) — fit для ethnocentric. (b) — для polycentric. (d) смешивает чужие соответствия.","difficulty":"medium"},{"id":"L5-07","concept":"staffing approach mapped to strategy","type":"multi","question":"Match the correct staffing-approach ↔ IB-strategy pairings. Select ALL correct pairings.","options":["Ethnocentric ↔ Home replication","Polycentric ↔ Localization","Geocentric ↔ Global standardization","Ethnocentric ↔ Transnational","Polycentric ↔ Global standardization"],"correct":[0,1,2],"explanation":"Верно (a,b,c): этно↔home replication, поли↔localization, гео↔global standardization (а также transnational). (d) неверно — transnational соответствует геоцентрическому. (e) неверно — global standardization соответствует геоцентрическому, не полицентрическому.","difficulty":"medium"},{"id":"L5-08","concept":"expatriate selection (4 dimensions)","type":"multi","question":"Which of the following are among the FOUR dimensions predicting expatriate success in a foreign posting? Select ALL that apply.","options":["Self-orientation","Others-orientation","Perceptual ability","Cultural toughness","Language fluency"],"correct":[0,1,2,3],"explanation":"Верно (a,b,c,d): четыре измерения отбора экспата — self-orientation (на себя), others-orientation (на других), perceptual ability (перцептивная способность), cultural toughness (культурная устойчивость). (e) Language flu
