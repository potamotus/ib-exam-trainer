ency — часть подготовки (language training), а НЕ измерение отбора; распространённая ловушка.","difficulty":"medium"},{"id":"L5-09","concept":"expatriate selection (4 dimensions)","type":"single","question":"The expatriate selection dimension defined as 'the ability to understand the different behavior of foreign nationals' is:","options":["Self-orientation","Others-orientation","Perceptual ability","Cultural toughness"],"correct":[2],"explanation":"Верно (c): perceptual ability (перцептивная способность) — понимание иного поведения иностранцев. (a) self-orientation — самооценка/уверенность/благополучие самого экспата. (b) others-orientation — умение эффективно взаимодействовать с местными. (d) cultural toughness — способность адаптироваться к незнакомой культуре. Ловушка: others-orientation про взаимодействие, perceptual ability про понимание поведения.","difficulty":"medium"},{"id":"L5-10","concept":"expatriate failure","type":"single","question":"'Expatriate failure' is best defined as:","options":["High resignation rates and premature return of an expatriate manager to the home country","The inability of an MNE to find qualified host-country managers","A subsidiary's failure to meet its local sales targets","The expatriate's refusal to accept a foreign posting"],"correct":[0],"explanation":"Верно (a): expatriate failure — высокий уровень увольнений и преждевременное возвращение менеджера-экспата домой. (b) — скорее повод для ethnocentric staffing, не определение провала. (c) и (d) не соответствуют определению.","difficulty":"easy"},{"id":"L5-11","concept":"expatriate failure","type":"multi","question":"Which are cited as causes of expatriate failure? Select ALL that apply.","options":["Inability of the spouse to adjust","Inability of the manager to adapt to the local culture","Excessively high foreign service premium","Low value-to-weight ratio of the product","None — failure is always due to language barriers"],"correct":[0,1],"explanation":"Верно (a,b): главные причины провала экспата — неспособность супруга(и) адаптироваться и неспособность самого менеджера приспособиться к местной культуре. (c) — компенсация не названа причиной. (d) — value-to-weight относится к производству (ловушка). (e) неверно — язык не единственная причина.","difficulty":"easy"},{"id":"L5-12","concept":"acculturation curve","type":"single","question":"What is the correct ORDER of phases in the U-shaped acculturation curve?","options":["Culture shock → Euphoria → Acculturation → Stable state","Euphoria → Culture shock → Acculturation → Stable state","Euphoria → Acculturation → Culture shock → Stable state","Acculturation → Euphoria → Stable state → Culture shock"],"correct":[1],"explanation":"Верно (b): кривая аккультурации U-образная — Euphoria (эйфория, пик) → Culture shock (шок, минимум) → Acculturation (восстановление) → Stable state (плато). Остальные варианты нарушают последовательность; эйфория всегда первой, шок — после неё.","difficulty":"easy"},{"id":"L5-13","concept":"acculturation curve","type":"multi","question":"Phase 4 (Stable state) of the acculturation curve branches into three possible outcomes. Which of the following are those outcomes? Select ALL that apply.","options":["Being assimilated to the local culture more than the natives","Feeling comfortable in both the original and the new culture (biculturally adapted)","Continuing to feel a foreigner and discriminated","Returning home prematurely and resigning","Achieving global standard salary"],"correct":[0,1,2],"explanation":"Верно (a,b,c): три исхода фазы 4 — ассимиляция сильнее местных (a), бикультурная адаптация (b), ощущение чужака/дискриминации (c). (d) — это expatriate failure (ловушка). (e) — компенсация при geocentric подходе, к кривой не относится.","difficulty":"medium"},{"id":"L5-14","concept":"compensation of expatriates","type":"single","question":"The 'Foreign Service Premium' in an expatriate compensation package is typically:","options":["An additional 10-30% of base salary","A 60-70% bonus on return","Equal to the host-country average wage","A one-time relocation grant only"],"correct":[0],"explanation":"Верно (a): Foreign Service Premium — надбавка за работу вне страны происхождения, обычно +10–30% базового оклада. (b) 60–70% — доля репатриантов, не знающих своей должности (ловушка-цифра). (c) и (d) не соответствуют структуре пакета.","difficulty":"medium"},{"id":"L5-15","concept":"compensation of expatriates","type":"multi","question":"Which components belong to the expatriate compensation package, and how is the 'national differences' question resolved? Select ALL correct statements.","options":["Base salary is usually kept in the same range as a comparable home-country position","The company usually pays the expatriate's income tax in the host country","Allowances cover hardship, housing, cost of living, and education","Under the geocentric approach, pay moves toward a single global standard salary","Under the polycentric approach, salary is equalized to home-country expatriates"],"correct":[0,1,2,3],"explanation":"Верно (a,b,c,d): база — как дома; компания платит подоходный налог в host country; allowances = hardship/housing/cost of living/education; geocentric → единый глобальный стандарт оклада. (e) неверно — это описание ETHNOCENTRIC; polycentric держит оклад страново-специфичным. Ловушка: перепутаны соответствия approach↔pay.","difficulty":"hard"},{"id":"L5-16","concept":"repatriation","type":"single","question":"Regarding repatriation, which statement is correct?","options":["A majority (60-70%) of repatriated managers do not know their position upon arrival home","Repatriated managers receive an automatic promotion of 10-30%","Repatriation is rarely a concern for MNEs","Repatriation refers to recruiting host-country nationals into HQ"],"correct":[0],"explanation":"Верно (a): большинство (60–70%) репатриированных менеджеров не знают своей должности по возвращении; репатриация — вопрос большой важности (great concern). (b) 10–30% — это Foreign Service Premium (ловушка). (c) противоречит 'great concern'. (d) описывает элемент polycentric staffing, а не репатриацию.","difficulty":"easy"},{"id":"L5-17","concept":"R&D types (basic/applied/development)","type":"single","question":"'Research that advances scientific knowledge but does not have specific immediate commercial objectives' defines:","options":["Basic research","Applied research","Development","Center-for-global R&D"],"correct":[0],"explanation":"Верно (a): basic research (фундаментальные) — двигают научное знание без немедленной коммерческой цели. (b) applied research — знание под конкретную коммерческую цель. (c) development — применение знания для прототипов и процессов. (d) — тип интернационализации R&D, не тип исследования. Цепочка: Basic → Applied → Development.","difficulty":"easy"},{"id":"L5-18","concept":"R&D internationalization (4 types: center-for-global etc.)","type":"single","question":"Under 'Local-for-global' R&D internationalization, R&D is carried out ___ and exploited ___.","options":["in the home country; globally","in foreign subsidiaries; locally","in foreign subsidiaries; globally","by globally linked subsidiaries; globally for the whole MNE"],"correct":[2],"explanation":"Верно (c): Local-for-global — R&D ведётся в зарубежных дочках (local), эксплуатируется глобально (global). (a) — Center-for-global. (b) — Local-for-local. (d) — Global-for-global. Ловушка: первая часть названия = где R&D, вторая = где эксплуатируется.","difficulty":"medium"},{"id":"L5-19","concept":"R&D internationalization (4 types: center-for-global etc.)","type":"multi","question":"Which descriptions of the four R&D internationalization types are correct? Select ALL that apply.","options":["Center-for-global: R&D in home country, exploited globally","Local-for-local: R&D in foreign subsidiaries, exploited locally","Global-for-global: globally linked subsidiaries carry out R&D globally for the whole MNE","Center-for-global: R&D in foreign subsidiaries, exploited locally","Local-for-local: R&D in home country, exploited globally"],"correct":[0,1,2],"explanation":"Верно (a,b,c) — точные определения. (d) неверно: это описание Local-for-local. (e) неверно: это описание Center-for-global. Ловушка — перестановка определений между типами.","difficulty":"medium"},{"id":"L5-20","concept":"R&D org models 2x2 (dispersion x cooperation) + strategic fit","type":"single","question":"In the 2×2 R&D organizational-models matrix, the two axes are:","options":["Dispersion of knowledge bases (Y) and Cooperation between R&D sites (X)","Cost reduction (Y) and Local responsiveness (X)","Fixed costs (Y) and Value-to-weight ratio (X)","Control (Y) and Partnership (X)"],"correct":[0],"explanation":"Верно (a): оси матрицы — Y = Dispersion of knowledge bases (рассредоточенность баз знаний, LOW/HIGH), X = Cooperation between R&D sites (кооперация площадок, LOW/HIGH). (b) — оси выбора международной стратегии (Л4). (c) — производственные факторы. (d) — оси выбора entry mode.","difficulty":"medium"},{"id":"L5-21","concept":"R&D org models 2x2 (dispersion x cooperation) + strategic fit","type":"multi","question":"Which R&D organizational model ↔ strategy/cell pairings are correct? Select ALL that apply.","options":["Integrated R&D network (high dispersion, high cooperation) ↔ Transnational","Ethnocentric centralized (low dispersion, low cooperation) ↔ Home replication","Polycentric decentralized (high dispersion, low cooperation) ↔ Localization","Geocentric centralized (low dispersion, high cooperation) ↔ Global standardization","Integrated R&D network ↔ Home replication"],"correct":[0,1,2,3],"explanation":"Верно (a,b,c,d): integrated network (high/high)↔transnational; ethnocentric centralized (low/low)↔home replication; polycentric decentralized (high dispersion/low cooperation)↔localization; geocentric centralized (low dispersion/high cooperation)↔global standardization. (e) неверно — integrated network соответствует transnational, а не home replication.","difficulty":"hard"},{"id":"L5-22","concept":"CAGE / distance still matters","type":"multi","question":"In the CAGE framework ('distance still matters'), which distances between countries are treated as real and consequential for international business? Select ALL that apply.","options":["Cultural","Administrative","Geographical","Economic","Technological"],"correct":[0,1,2,3],"explanation":"Верно (a,b,c,d): CAGE = Cultural, Administrative, Geographical, Economic distances; мир по-прежнему определён нацграницами → 'one size does not fit all'. (e) Technological — не входит в CAGE; правдоподобный дистрактор.","difficulty":"easy"},{"id":"L5-23","concept":"market segmentation / intermarket segments (customization vs standardization)","type":"single","question":"The existence of 'intermarket segments' that transcend national borders and span multiple countries primarily:","options":["Allows standardization of the global marketing strategy","Requires customization of the global marketing strategy","Forces an ethnocentric staffing approach","Eliminates the need for brand architecture"],"correct":[0],"explanation":"Верно (a): межрыночные (трансграничные) сегменты позволяют стандартизацию маркетинговой стратегии. (b) — это вывод из различий в структуре сегментов между странами (требует кастомизации); ловушка-зеркало. (c) и (d) не связаны с сегментацией.","difficulty":"medium"},{"id":"L5-24","concept":"brand architecture (branded house/house of brands/hybrid)","type":"single","question":"Which brand architecture maximizes 'control and consistency' (vs 'local relevance')?","options":["Branded house (one global master brand)","House of brands (portfolio of local/segment brands)","Hybrid (global brand + local sub-brands)","Intermarket segmentation"],"correct":[0],"explanation":"Верно (a): branded house (одна глобальная мастер-марка) тяготеет к максимуму control & consistency. (b) house of brands даёт больше local relevance. (c) hybrid — посередине. (d) — инструмент сегментации, не архитектура бренда.","difficulty":"medium"},{"id":"L5-25","concept":"marketing mix 4P (product/place/promotion/price)","type":"multi","question":"Which factors are cited as influencing PRODUCT attributes (a bundle of attributes matching consumers' needs)? Select ALL that apply.","options":["Cultural differences","Differences in economic development","Differences in product and technical standards","Retail concentration","Noise levels"],"correct":[0,1,2],"explanation":"Верно (a,b,c): три фактора атрибутов продукта — культурные различия, экономическое развитие, продуктовые/технические стандарты. (d) retail concentration — параметр системы дистрибуции, не продукта. (e) noise levels — барьер коммуникации. Ловушка: смешение элементов 4P.","difficulty":"medium"},{"id":"L5-26","concept":"marketing mix 4P (product/place/promotion/price)","type":"single","question":"Price discrimination lets a firm maximize profits by charging HIGHER prices in markets where demand is:","options":["Inelastic (a large price change causes only a small change in demand)","Elastic (demand responds strongly to price)","Perfectly competitive","Subject to high trade barriers"],"correct":[0],"explanation":"Верно (a): выше цену ставят там, где спрос неэластичен (крутая кривая, объём слабо реагирует на цену). (b) — зеркальная ловушка: на эластичном рынке высокую цену держать нельзя. (c) и (d) не относятся к логике эластичности.","difficulty":"medium"},{"id":"L5-27","concept":"communication barriers","type":"multi","question":"Which are among the four 'barriers to international communication'? Select ALL that apply.","options":["National culture","Source and country-of-origin effects","Noise levels","Legal issues (advertising regulations)","Channel exclusivity"],"correct":[0,1,2,3],"explanation":"Верно (a,b,c,d): четыре барьера коммуникации — national culture, source & country-of-origin effects, noise levels, legal issues (рекламные нормы). (e) channel exclusivity — параметр системы дистрибуции, не барьер коммуникации; ловушка из соседнего элемента 4P.","difficulty":"medium"},{"id":"L5-28","concept":"standardization vs customization spectrum","type":"single","question":"The choice between standardized and customized international marketing is best characterized as:","options":["NOT an either/or proposition — a full spectrum from full customization to full standardization","A strict binary: either fully standardized or fully customized","Always resolved in favor of full standardization to save costs","Determined solely by the value-to-weight ratio"],"correct":[0],"explanation":"Верно (a): маркетинг — не выбор 'или–или', а позиция на континууме: Full customization ↔ Partial customization ↔ Partial standardization ↔ Full standardization. (b) противоречит 'not an either/or'. (c) игнорирует гибкость. (d) value-to-weight относится к производству, не к маркетингу.","difficulty":"easy"},{"id":"L5-29","concept":"production: concentration vs decentralization","type":"single","question":"'Concentrating production' is defined as producing:","options":["At a single or very few locations to serve the global market","In multiple regional or national locations close to major markets","Only through outsourcing to third parties","Wherever exchange rates are most volatile"],"correct":[0],"explanation":"Верно (a): концентрация — производство на одной/очень немногих локациях для всего мирового рынка. (b) — определение децентрализации. (c) смешивает с вопросом in-house vs outsource. (d) — волатильные курсы благоприятствуют децентрализации.","difficulty":"easy"},{"id":"L5-30","concept":"minimum efficient scale","type":"single","question":"A HIGH minimum efficient scale (MES) relative to global demand favors:","options":["Concentrating production at one or a few plants","Decentralizing production across many plants","Outsourcing all production locally","A polycentric staffing approach"],"correct":[0],"explanation":"Верно (a): высокий МЭМ относительно мирового спроса → одного-двух заводов достаточно → концентрация. (b) — наоборот, низкий МЭМ делает выгодным много заводов. (c) и (d) — из других блоков (операции in/out и HR), к МЭМ не относятся.","difficulty":"medium"},{"id":"L5-31","concept":"value-to-weight ratio / universal needs","type":"multi","question":"Which product-factor conditions favor CONCENTRATING production? Select ALL that apply.","options":["High value-to-weight ratio (transport is cheap relative to product value)","The product serves universal needs","Low value-to-weight ratio (transport is costly relative to product value)","The product does NOT serve universal needs","High value-to-weight combined with universal needs"],"correct":[0,1,4],"explanation":"Верно (a,b,e): высокое стоимость/вес (дешёвый транспорт) и универсальные потребности благоприятствуют концентрации; их сочетание (e) — тем более. (c) низкое стоимость/вес → дорого возить → децентрализация. (d) неуниверсальные потребности → децентрализация под локальные нужды. Ловушка — зеркальные значения тех же факторов.","difficulty":"hard"},{"id":"L5-32","concept":"Hill&Hult concentration/decentralization factor table","type":"multi","question":"In the country/exchange-rate factor logic for location, which conditions favor CONCENTRATED production? Select ALL that apply.","options":["Few trade barriers","Stable exchange rates","High fixed costs","Substantial trade barriers","Volatile exchange rates"],"correct":[0,1,2],"explanation":"Верно (a,b,c): концентрации благоприятствуют МАЛО торговых барьеров, СТАБИЛЬНЫЕ курсы и ВЫСОКИЕ постоянные издержки. (d) и (e) — наоборот, существенные торговые барьеры и волатильные курсы благоприятствуют децентрализации. Это две 'инверсные' строки: барьеры и курсы работают наоборот относительно различий систем/культуры/издержек.","difficulty":"hard"},{"id":"L5-33","concept":"risk & resilience (supplier diversification, dual sourcing, etc.)","type":"multi","question":"Which are 'resilience levers' that counterbalance efficiency in global operations? Select ALL that apply.","options":["Supplier diversification","Dual sourcing","Inventory buffers for critical components","Regionalization for time-sensitive products","Maximizing minimum efficient scale at a single plant"],"correct":[0,1,2,3],"explanation":"Верно (a,b,c,d): рычаги устойчивости — диверсификация поставщиков, dual sourcing, буферные запасы критичных компонентов, регионализация для time-sensitive продуктов; ради непрерывности жертвуют частью экономии. (e) неверно — максимизация МЭМ на одном заводе повышает эффективность/концентрацию, но снижает устойчивость (единая точка отказа), это противоположность resilience.","difficulty":"medium"}],"open":[{"id":"L5-O1","concept":"production: concentration vs decentralization","question":"Explain how PRODUCT factors influence the decision to concentrate or decentralize production. Refer to the specific factors and illustrate with examples of your choice.","model_answer":"Продуктовые факторы (product factors) включают два элемента. (1) Отношение стоимость/вес (value-to-weight ratio): у дорогих и лёгких товаров (например, электронные компоненты, фармацевтика) высокое стоимость/вес — транспорт относительно дёшев, поэтому выгодно КОНЦЕНТРИРОВАТЬ производство на одной оптимальной локации и развозить по миру. У дешёвых и тяжёлых товаров (например, сахар, химикаты, нефтепродукты) низкое стоимость/вес — возить дорого, поэтому производство ДЕЦЕНТРАЛИЗУЮТ ближе к рынкам. (2) Универсальность потребностей (universal needs): если продукт удовлетворяет универсальные потребности (вкусы потребителей в разных странах схожи), компания концентрирует производство в оптимальной локации, экономя на масштабе; если потребности НЕ универсальны, производство децентрализуют, чтобы отвечать на локальные нужды. Итог: высокое стоимость/вес + универсальные потребности → концентрация; низкое стоимость/вес + неуниверсальные потребности → децентрализация.","model_points":["Два продуктовых фактора: value-to-weight ratio и serves universal needs","Высокое стоимость/вес → дешёвый транспорт → концентрация (примеры товаров на выбор студента, напр. электроника, фарма)","Низкое стоимость/вес → дорогой транспорт → децентрализация ближе к рынкам (напр. сахар, химикаты, нефтепродукты)","Универсальные потребности → концентрация в оптимальной локации (экономия на масштабе)","Неуниверсальные потребности → децентрализация под локальные нужды"]},{"id":"L5-O2","concept":"staffing approach mapped to strategy","question":"Discuss the three staffing approaches (ethnocentric, polycentric, geocentric) and explain how each maps onto an IB strategy. Show how the SAME logic governs expatriate compensation across national differences.","model_answer":"Три подхода к staffing: (1) Этноцентрический (ethnocentric) — все ключевые посты занимают граждане страны происхождения (home-country nationals); плюсы — закрывает нехватку местных менеджеров, усиливает корпкультуру, передаёт ключевые компетенции; минусы — недовольство местных и культурная близорукость (cultural myopia); fit — Home replication. (2) Полицентрический (polycentric) — местные (host-country nationals) управляют дочками, в HQ — свои; плюсы — снимает культурную близорукость, дёшев (нет экспатов); минусы — ограничивает карьерную мобильность, изолирует HQ; fit — Localization. (3) Геоцентрический (geocentric) — лучшие на пост независимо от национальности, мультинац. команды; плюсы — эффективное использование людей, сильная корпкультура и неформальные сети; минусы — иммиграционные ограничения, дороговизна; fit — Global standardization и Transnational. Та же тройка задаёт логику компенсации при 'national differences': ethnocentric → оклад как у экспатов из страны происхождения; polycentric → оклад держат страново-специфичным; geocentric → движение к единому глобальному стандарту. То есть выбор staffing-подхода — проекция международной стратегии, и он же определяет, выравнивать оплату глобально или оставлять страново-специфичной.","model_points":["Ethnocentric: home-country nationals на ключевых постах; cultural myopia; fit Home replication","Polycentric: host-country nationals в дочках, HQ — свои; снимает myopia, дёшев; fit Localization","Geocentric: лучшие независимо от национальности, мультинац. команды; fit Global standardization + Transnational","Компенсация по тому же подходу: ethno→как дома, poly→страново-специфично, geo→единый глобальный стандарт","Вывод: staffing = проекция стратегии Л4, и он же управляет логикой вознаграждения"]},{"id":"L5-O3","concept":"R&D org models 2x2 (dispersion x cooperation) + strategic fit","question":"Explain the 2×2 R&D organizational-models matrix: name the two axes, the four models, and their strategic fit. Illustrate each model with a company example of your choice.","model_answer":"Оси матрицы: Y — Dispersion of knowledge bases (рассредоточенность баз знаний, LOW/HIGH); X — Cooperation between R&D sites (кооперация площадок, LOW/HIGH). Четыре модели: (1) Ethnocentric centralized (низкая дисперсия, низкая кооперация) — один HQ-центр, минимум локализации; + масштаб/эффективность, короткие циклы, защита технологий; − слабая чувствительность к локальному, 'not-invented-here'; fit — Home replication. (2) Polycentric decentralized (высокая дисперсия, низкая кооперация) — децентрализованные R&D по рынкам; + адаптивность, локальные ресурсы; − дублирование, фрагментация, проблема критической массы; fit — Localization. (3) Geocentric centralized (низкая дисперсия, высокая кооперация) — центр проектирует глобальные платформы + связи с площадками; + масштаб, быстрый rollout; − зависимость от HQ, мало локализации; fit — Global standardization. (4) Integrated R&D network (высокая дисперсия, высокая кооперация) — сеть Centers of Excellence без единого центра, cross-border teams; + специализация + синергия, оргобучение, глоб. эффективность + лок. адаптация; − высокие издержки координации, сложность; fit — Transnational. Для иллюстрации каждой модели можно привести подходящую компанию на свой выбор (важно, чтобы пример соответствовал логике дисперсии/кооперации).","model_points":["Оси: Dispersion of knowledge bases (Y) × Cooperation between R&D sites (X)","Ethnocentric centralized (low/low) → Home replication","Polycentric decentralized (high dispersion/low coop) → Localization","Geocentric centralized (low dispersion/high coop) → Global standardization","Integrated R&D network (high/high) → Transnational","Пример компании к каждой модели — на выбор студента, лишь бы соответствовал ячейке"]},{"id":"L5-O4","concept":"marketing mix 4P (product/place/promotion/price)","question":"Discuss the four barriers to international communication and explain how legal issues (advertising regulations) can block standardized global marketing. Illustrate the legal barrier with an example of your choice.","model_answer":"Международная коммуникация возникает всякий раз, когда компания использует маркетинговое сообщение для продажи продукта в другой стране. Четыре барьера: (1) National culture (национальная культура) — сообщение, означающее одно в одной стране, может значить совсем другое в другой. (2) Source and country-of-origin effects — source effects возникают, когда потребители целевой страны предубеждены против иностранных фирм; country-of-origin effects — когда они ориентируются на страну происхождения для оценки продукта. (3) Noise levels — число конкурирующих за внимание сообщений; снижает вероятность эффективной коммуникации и особенно высок в развитых странах. (4) Legal issues — рекламные нормы (advertising regulations) различаются по странам и могут блокировать внедрение стандартизированного глобального маркетинга. Механизм блокировки: одна и та же реклама может быть легальна в одной стране и запрещена в другой (например, ограничения на заявления о пользе для здоровья, на использование детей в рекламе или на сравнительные/конкурентные заявления — конкретные нормы зависят от страны). Поскольку единое стандартизированное сообщение тогда не проходит во всех странах, компания вынуждена адаптировать кампанию по странам, что и показывает, как legal issues подрывают стандартизацию.","model_points":["Четыре барьера: national culture; source & country-of-origin effects; noise levels; legal issues","Source effects = предубеждение против иностранных фирм; country-of-origin = оценка по стране происхождения","Noise = конкурирующие сообщения, особенно высок в развитых странах","Legal issues: рекламные нормы различаются по странам и блокируют стандартизированный глобальный маркетинг","Иллюстрация: одна и та же реклама легальна в одной стране и запрещена в другой (пример на выбор студента) → нужна адаптация кампании по странам"]}]},{"topic":"📄 Прошлый экзамен (реальный, 25 вопросов)","mcq":[{"id":"EX-01","concept":"drivers: strategic imperatives","type":"single","question":"Which driver(s) motivate(s) globalization of markets and production?","options":["Availability of resources and supplies outside national borders","Decline in cross-border trade barriers","Decline in cross-border investment barriers","Technological advancement"],"correct":[0],"explanation":"Верно (A): доступ к ресурсам/поставкам за рубежом — это стратегический императив (strategic imperative), который МОТИВИРУЕТ глобализацию. B, C, D — изменения среды (environmental changes), которые её ОБЛЕГЧАЮТ, а не мотивируют. Ловушка на различии «мотивируют vs облегчают».","difficulty":"medium"},{"id":"EX-02","concept":"world is flat vs CAGE","type":"multi","question":"Which factor(s) support(s) the \"Distance Still Matters\" perspective?","options":["Global labor mobility and cross-border employment","Cultural differences and distinctive local market demands","Standardization of global products and services","High transportation costs associated with long-distance shipping"],"correct":[1,3],"explanation":"Верно (B, D): «Distance Still Matters» (Ghemawat, CAGE) утверждает, что различия между странами реальны. B — культурная дистанция и локальные различия спроса; D — географическая дистанция (высокие транспортные издержки). A и C поддерживают противоположный взгляд «мир плоский» (flat world).","difficulty":"medium"},{"id":"EX-03","concept":"traditional vs neo-internationalization","type":"single","question":"An automobile company has been operating a profitable plant abroad for several years. After generating earnings, it wants to transfer a portion of profits back to its home-country headquarters. How is this process called?","options":["Reshoring","Expatriation","Nationalization","Repatriation"],"correct":[3],"explanation":"Верно (D): репатриация (repatriation) — возврат средств/прибыли в домашнюю страну. Reshoring — возврат производства; Expatriation — отправка сотрудника за рубеж; Nationalization — переход активов под госконтроль.","difficulty":"medium"},{"id":"EX-04","concept":"mercantilism / neomercantilism","type":"single","question":"Theories of international trade useful in understanding inter-industry trade of undifferentiated goods are referred to as:","options":["Modern trade theories","Classical trade theories","Institutional trade theories"],"correct":[1],"explanation":"Верно (B): классические страновые теории (classical country-based theories) объясняют межотраслевую торговлю (inter-industry trade) стандартизированными недифференцированными товарами. Современные (modern firm-based) объясняют внутриотраслевую торговлю дифференцированными товарами.","difficulty":"medium"},{"id":"EX-05","concept":"regional integration: 5 levels","type":"multi","question":"What are the features of a customs union?","options":["Integration of political and economic affairs","Free movement of goods, people and capital","Removal of intragroup tariffs","Common economic policies","Common external tariff"],"correct":[2,4],"explanation":"Верно (C, E): таможенный союз (customs union) = зона свободной торговли (отмена внутренних тарифов, C) + единый внешний тариф (common external tariff, E). Свободное движение людей/капитала (B) — это общий рынок; общие эконом. политики (D) — экономический союз; полит. интеграция (A) — политический союз.","difficulty":"medium"},{"id":"EX-06","concept":"Hofstede: power distance","type":"multi","question":"According to Hofstede's framework, flexible hierarchies and simple procedures are influenced by a culture characterized by:","options":["High power distance","Low power distance","High uncertainty avoidance","Low uncertainty avoidance"],"correct":[1,3],"explanation":"Верно (B, D): гибкие иерархии → низкая дистанция власти (low power distance); простые процедуры (мало жёстких правил) → низкое избегание неопределённости (low uncertainty avoidance).","difficulty":"medium"},{"id":"EX-07","concept":"internalization theory (transaction costs)","type":"single","question":"According to internalization theory, a company should enter a foreign market via FDI when transaction costs are:","options":["High","Low","Transaction costs do not affect this decision"],"correct":[0],"explanation":"Верно (A): при ВЫСОКИХ транзакционных издержках (transaction costs) выгодно интернализировать операции → FDI. При низких — дешевле контракты (экспорт, лицензирование, франчайзинг).","difficulty":"medium"},{"id":"EX-08","concept":"high vs low context (Hall)","type":"single","question":"German executives prefer direct, explicit discussions with clear yes/no answers, while Japanese partners communicate indirectly, relying on nonverbal cues and 'reading between the lines'. Which concept best explains this?","options":["Individualism vs. collectivism","High-context vs. low-context cultures","High-power vs. low-power distance","Masculinity vs. femininity","Uncertainty avoidance vs. uncertainty acceptance"],"correct":[1],"explanation":"Верно (B): прямая явная коммуникация (Германия) = низкоконтекстная культура (low-context); косвенная, через невербалику и подразумеваемое (Япония) = высококонтекстная (high-context) — рамка Холла (Hall).","difficulty":"medium"},{"id":"EX-09","concept":"home replication strategy","type":"single","question":"A luxury Swiss watch brand expands internationally selling hand-made products, relying on strong brand reputation and a standardized marketing approach worldwide. Which IB strategy is it following?","options":["Transnational strategy","Localization strategy","Home replication strategy","Global standardization strategy"],"correct":[2],"explanation":"Верно (C): репликация домашней модели (home replication) — «что работает дома, сработает за рубежом», минимум локальной адаптации, опора на домашние компетенции и бренд (классический пример — Rolex). Низкое давление и на издержки, и на локальную адаптацию.","difficulty":"medium"},{"id":"EX-10","concept":"AAA: aggregation","type":"single","question":"According to Ghemawat's AAA model, companies seeking to maximize their economies of scale adopt the strategy of:","options":["Adaptation","Aggregation","Arbitrage","Augmentation"],"correct":[1],"explanation":"Верно (B): агрегирование (Aggregation) — группировка стран/рынков ради экономии на масштабе и охвате (economies of scale and scope). Adaptation — локальная адаптация; Arbitrage — использование различий; Augmentation — не входит в модель AAA (ловушка).","difficulty":"medium"},{"id":"EX-11","concept":"worldwide area division -> localization","type":"multi","question":"An MNC operates in several countries and lets regional managers decide on product offerings, pricing and marketing based on local preferences. Which best fits this organizational structure?","options":["Decentralization","Centralization","Worldwide product division","Worldwide area division"],"correct":[0,3],"explanation":"Верно (A, D): передача решений региональным менеджерам = децентрализация (decentralization, вертикальная дифференциация); деление по регионам с локальной автономией = всемирная региональная структура (worldwide area division), которая соответствует стратегии локализации. Centralization и worldwide product division — противоположный, продуктово-централизованный полюс.","difficulty":"medium"},{"id":"EX-12","concept":"interdependence -> performance ambiguity -> cost of control","type":"single","question":"Higher interdependence between the subunits within the organizational structure leads to:","options":["Higher costs of control","Lower costs of control","It has no effect on the costs of control"],"correct":[0],"explanation":"Верно (A): рост взаимозависимости (interdependence) → выше неоднозначность оценки результата (performance ambiguity) → выше стоимость контроля (cost of control). Это цепочка нарастания управленческой сложности к транснациональной стратегии.","difficulty":"medium"},{"id":"EX-13","concept":"international franchising vs licensing","type":"multi","question":"If a company has a location advantage but does NOT have an internalization advantage in the foreign country, it should enter the market via:","options":["Foreign direct investment","Exporting","International franchising","International licensing"],"correct":[2,3],"explanation":"Верно (C, D): по дереву OLI есть O и L, но нет I (контроль не критичен) → лицензирование/франчайзинг. FDI требует преимущества интернализации; экспорт уместен при отсутствии преимущества локации (а оно как раз есть).","difficulty":"medium"},{"id":"EX-14","concept":"mercantilism / neomercantilism","type":"single","question":"Which statement aligns with the principles of Mercantilism?","options":["Governments should promote free trade and minimize intervention in the economy.","Exports should be maximized, while imports should be minimized to increase national wealth.","Governments need to ensure the balance between exports and imports."],"correct":[1],"explanation":"Верно (B): меркантилизм (mercantilism) — наращивать богатство страны, максимизируя экспорт и ограничивая импорт (через субсидии экспортёрам и тарифы). A — свободная торговля (противоположность); C — про баланс, не про суть меркантилизма.","difficulty":"medium"},{"id":"EX-15","concept":"nationalization (expropriation/confiscation)","type":"multi","question":"A foreign government takes control of a multinational company's assets. This may be called:","options":["Expropriation","Privatization","Confiscation"],"correct":[0,2],"explanation":"Верно (A, C): национализация (переход частных активов под госконтроль) принимает форму экспроприации (expropriation, с компенсацией) или конфискации (confiscation, без компенсации). Приватизация (B) — обратный процесс.","difficulty":"medium"},{"id":"EX-16","concept":"Global Innovation Index","type":"multi","question":"What can we learn from the Global Innovation Index (GII)?","options":["GII ranks countries by their ability to attract foreign direct investment.","GII evaluates countries' capacity to produce and implement new technologies.","GII evaluates countries' institutional and business environments.","GII shows the political risk level in each country."],"correct":[1,2],"explanation":"Верно (B, C): GII (Global Innovation Index) оценивает инновационный потенциал — способность создавать и внедрять технологии (B) и качество институциональной и деловой среды (C, входы индекса). A (привлечение FDI) и D (политический риск) — не про GII.","difficulty":"medium"},{"id":"EX-17","concept":"formal institutions and functions","type":"multi","question":"Which characteristics describe formal institutions?","options":["They are enforced through legal systems.","They are often considered products of national culture.","They are mainly enforced through social pressure.","They refer to government regulations, laws, contracts, and international treaties."],"correct":[0,3],"explanation":"Верно (A, D): формальные институты (formal institutions) — это законы, регламенты, контракты, международные договоры (D), обеспечиваемые правовой системой (A). Принуждение через социальное давление (C) и «продукт культуры» (B) описывают неформальные институты.","difficulty":"medium"},{"id":"EX-18","concept":"3 sources of competitiveness and trade-off","type":"multi","question":"Global efficiencies are a key source of international competitiveness. What do they refer to?","options":["Location economies","Economies of scale","Economies of scope","Knowledge transfer among subsidiaries"],"correct":[0,1,2],"explanation":"Верно (A, B, C): глобальная эффективность (global efficiencies) = экономия от размещения (location economies) + эффект масштаба (economies of scale) + эффект охвата (economies of scope). Передача знаний между подразделениями (D) — это worldwide learning, другой источник конкурентоспособности.","difficulty":"medium"},{"id":"EX-19","concept":"Dunning OLI","type":"single","question":"The OLI framework is based on:","options":["Vernon's product life-cycle theory","Porter's theory of national competitive advantage","Dunning's eclectic theory"],"correct":[2],"explanation":"Верно (C): OLI (Ownership–Location–Internalization) — это эклектическая теория Даннинга (Dunning's eclectic theory). Вернон — жизненный цикл продукта; Портер — национальное конкурентное преимущество.","difficulty":"medium"},{"id":"EX-20","concept":"staffing: ethnocentric/polycentric/geocentric","type":"multi","question":"Which statements describe an ethnocentric staffing approach?","options":["All key management positions are filled by home-country nationals — both at HQ and foreign subsidiaries.","It fosters strong career advancement for host-country nationals.","It helps transfer core competencies from headquarters to foreign subsidiaries.","Host-country nationals are hired to manage subsidiaries, as they know the market.","It minimizes resentment among host-country employees."],"correct":[0,2],"explanation":"Верно (A, C): этноцентрический подход — ключевые посты везде занимают граждане страны происхождения (A), что помогает переносить ключевые компетенции из HQ в дочки (C). B, D, E описывают полицентрический подход (местные кадры, их рост, меньше недовольства).","difficulty":"medium"},{"id":"EX-21","concept":"staffing approach mapped to strategy","type":"multi","question":"Which R&D models correctly fit the indicated IB strategies?","options":["Ethnocentric centralized R&D → Home replication","Polycentric decentralized R&D → Localization","Geocentric centralized R&D → Transnational"],"correct":[0,1],"explanation":"Верно (A, B): этноцентрическая централизованная R&D ↔ home replication; полицентрическая децентрализованная ↔ localization. C неверно: геоцентрическая централизованная R&D соответствует global standardization, а transnational — интегрированной R&D-сети (integrated R&D network).","difficulty":"medium"},{"id":"EX-22","concept":"R&D org models 2x2","type":"multi","question":"Which factors are important for the location of R&D?","options":["Knowledge intensity (specialized talent and clusters).","Market proximity (local customer needs and regulations).","Protection and control (IP risks, data rules, enforcement).","Coordination cost (time zones, language, project complexity)."],"correct":[0,1,2,3],"explanation":"Верно (A, B, C, D): все четыре — критерии размещения R&D: интенсивность знаний, близость к рынку, защита и контроль (IP), издержки координации.","difficulty":"medium"},{"id":"EX-23","concept":"standardization vs customization spectrum","type":"multi","question":"Which statements about standardization of global marketing are correct?","options":["Standardization is always superior because it guarantees a single global customer experience.","Standardization can lower marketing costs and support a consistent global brand identity.","Standardization does not mean local adjustments are not allowed; degrees of standardization may vary."],"correct":[1,2],"explanation":"Верно (B, C): стандартизация снижает издержки и поддерживает единый бренд (B), но допускает локальные настройки — степень стандартизации варьируется (C). A — ловушка: «always superior» неверно, единый подход не всегда оптимален.","difficulty":"medium"},{"id":"EX-24","concept":"production: concentration vs decentralization","type":"multi","question":"Which rules about locating production are valid?","options":["If fixed costs of setting up a plant are high, production is more likely to be concentrated in one/few locations.","If minimum efficient scale is high relative to global demand, production tends to be concentrated.","If a product serves universal needs, firms tend to decentralize production."],"correct":[0,1],"explanation":"Верно (A, B): высокие постоянные издержки (fixed costs) и высокий минимальный эффективный масштаб (minimum efficient scale) относительно мирового спроса → концентрация производства. C — ловушка: универсальные потребности (universal needs) ведут к КОНЦЕНТРАЦИИ, а не к децентрализации.","difficulty":"medium"},{"id":"EX-25","concept":"value-to-weight ratio / universal needs","type":"multi","question":"A product's value-to-weight ratio affects global operations. Which statements are correct?","options":["Low value-to-weight products often require production closer to host markets to limit shipping costs.","High value-to-weight products always require local production in every country.","High value-to-weight products are easier to ship, making centralized production more viable."],"correct":[0,2],"explanation":"Верно (A, C): низкое отношение стоимость/вес (тяжёлое и дешёвое) → дорого возить → производить ближе к рынкам (A). Высокое отношение (лёгкое и дорогое) → дёшево возить → выгодна концентрация (C). B — ловушка: «always... in every country» неверно.","difficulty":"medium"}],"open":[]}],"totals":{"mcq":195,"open":20}}; /* __BANK__ */

};

/* ---- утилиты ---- */
const $ = s => document.querySelector(s);
const view = () => $('#view');
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function allMcq(){return BANK.lectures.flatMap((l,i)=>(l.mcq||[]).map(q=>({...q,_lec:lecN(l,i)})));}
function allOpen(){return BANK.lectures.flatMap((l,i)=>(l.open||[]).map(q=>({...q,_lec:lecN(l,i)})));}
function lecN(l,i){const id=(l.mcq?.[0]?.id||l.open?.[0]?.id||'');if(id.startsWith('EX'))return 6;const m=id.match(/L(\d)/);return m?+m[1]:i+1;}
function isRealExam(q){return String(q.id||'').startsWith('EX');}
const LET = ['A','B','C','D','E','F'];
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
/* ---- тема ---- */
function applyTheme(t){document.body.setAttribute('data-theme',t);const b=document.getElementById('themeBtn');if(b)b.textContent=t==='dark'?'🌙 Тёмная':'☀️ Светлая';}
function toggleTheme(){const cur=document.body.getAttribute('data-theme')==='dark'?'dark':'light';const nx=cur==='dark'?'light':'dark';localStorage.setItem('ib_theme',nx);applyTheme(nx);}
/* ---- учёт неправильных ответов ---- */
function isRight(ans,correct){const a=(ans||[]).slice().sort(),c=correct.slice().sort();return a.length===c.length&&a.every((v,i)=>v===c[i]);}
function getWrong(){try{return new Set(JSON.parse(localStorage.getItem('ib_wrong')||'[]'));}catch(e){return new Set();}}
function markResult(id,correct){const s=getWrong();if(correct)s.delete(id);else s.add(id);localStorage.setItem('ib_wrong',JSON.stringify([...s]));}

/* ---- роутер ---- */
function go(where,arg){ if(where==='home')home(); else if(where==='exam')exam(); else if(where==='practice')practice(arg); else if(where==='practiceRun')practiceRun(arg); else if(where==='practiceWrong')practiceWrong(); window.scrollTo(0,0);}

      <p>Вопросы генерируются и проверяются — файл будет встроен в тренажёр.</p></div>`;

   </div>
   <div class="grid">
     <div class="card">
       <h2>📝 Режим экзамена</h2>
       <p>Сборка как на реальном экзамене: <b>${EXAM.mcq} тестовых</b> (по ${EXAM.mcqPts} балла) + <b>${EXAM.open} открытых</b> (по ${EXAM.openPts} баллов). Всё на английском. Авто-оценка теста, эталоны к открытым. Итог из 50.</p>
       <button class="btn" onclick="go('exam')">Начать экзамен →</button>
     </div>
     <div class="card">
       <h2>📚 Практика по темам</h2>
       <p>Вопросы по выбранной лекции по одному, с мгновенным разбором на русском. Без оценки — для разбора материала.</p>
       <button class="btn" onclick="go('practice')">Выбрать лекцию →</button>
     </div>
     <div class="card" style="border-color:var(--accent)">
       <h2>📄 Прошлый экзамен (реальный)</h2>
       <p>25 вопросов с реального экзамена прошлого года (формат может меняться, но темы те же). Идут по одному с разбором. Не входят в случайную сборку режима экзамена.</p>
       <button class="btn" onclick="go('practiceRun',6)">Прорешать реальный экзамен →</button>
     </div>
   </div>
   <p class="legend">Формат экзамена: pen-and-paper, 20 multiple-choice (часть — «выбери все верные» из 5) + 2 open-ended. Полностью на английском.</p>`;
}

/* ---- рендер MCQ ---- */
function mcqHTML(q,idx,state){
  const opts=q.options.map((o,i)=>{
    const checked=state.ans?.includes(i)?'checked':'';
    const inp=q.type==='multi'?`<input type="checkbox" ${checked} onchange="toggle(${idx},${i},true)">`
                              :`<input type="radio" name="q${idx}" ${checked} onchange="toggle(${idx},${i},false)">`;
    let cls='opt';
    if(state.graded){
      const corr=q.correct.includes(i), chose=state.ans?.includes(i);
      if(corr&&chose)cls+=' correct'; else if(!corr&&chose)cls+=' wrong'; else if(corr&&!chose)cls+=' miss';
    }
    return `<label class="${cls}">${inp}<span class="lab">${LET[i]}</span><span>${esc(o)}</span></label>`;
  }).join('');
  const fb=state.graded?feedbackHTML(q,state):'';
  const expl=state.graded?`<div class="expl show"><div style="margin-bottom:7px;color:var(--accent);font-weight:700;font-size:12.5px">🏷 Тема: ${esc(q.concept||'—')} · ${esc((LTITLE[q._lec]||'').split('·')[0].trim())}</div><b>Разбор.</b> ${esc(q.explanation)}</div>`:'';
  return `<div class="q" id="q${idx}">
    <div class="meta"><span class="qnum">${idx+1}. <span style="color:var(--muted);font-weight:400">${LTITLE[q._lec]?.split('·')[0]||''}· ${esc(q.concept||'')}</span></span>
      <span class="pill ${q.type}">${q.type==='multi'?'выбери все верные':'один ответ'}</span></div>
    <div class="qtext">${esc(q.question)}</div>
    ${opts}${fb}${expl}</div>`;
}
function feedbackHTML(q,state){
  const a=(state.ans||[]).slice().sort(), c=q.correct.slice().sort();
  const ok=a.length===c.length&&a.every((v,i)=>v===c[i]);
  return `<div class="feedback ${ok?'ok':'bad'}">${ok?'✓ Верно':'✗ Неверно — правильно: '+c.map(i=>LET[i]).join(', ')}</div>`;
}

/* ---- EXAM ---- */
let EX=null;
function exam(){
  // proportional sample across lectures (без реального экзамена — он отдельной колодой)
  const byLec={}; allMcq().filter(q=>!isRealExam(q)).forEach(q=>{(byLec[q._lec]=byLec[q._lec]||[]).push(q)});
  let pool=[];
  const lecs=Object.keys(byLec);
  const per=Math.max(1,Math.floor(EXAM.mcq/lecs.length));
  lecs.forEach(L=>{pool.push(...shuffle(byLec[L]).slice(0,per))});
  // fill remainder
  let rest=shuffle(allMcq().filter(q=>!isRealExam(q)&&!pool.includes(q)));
  while(pool.length<EXAM.mcq&&rest.length)pool.push(rest.shift());
  pool=shuffle(pool).slice(0,EXAM.mcq);
  const opens=shuffle(allOpen()).slice(0,EXAM.open);
  EX={mcq:pool.map(q=>({q,ans:[],graded:false})),open:opens,graded:false};
  renderExam();
}
function renderExam(){
  const m=EX.mcq.map((s,i)=>mcqHTML(s.q,i,s)).join('');
  const o=EX.open.map((q,i)=>openHTML(q,i)).join('');
  const head=EX.graded?examScore():`<div class="card" style="margin-bottom:14px"><h2>Экзамен</h2><p>${EXAM.mcq} тестовых + ${EXAM.open} открытых. Ответь и нажми «Сдать». Открытые оцени сам по эталону.</p></div>`;
  view().innerHTML=head+m
    +`<h3 style="margin:22px 0 10px">Открытые вопросы (Open-ended)</h3>`+o
    +`<div class="bar">${EX.graded?`<button class="btn" onclick="go('exam')">Новый экзамен ↻</button><button class="btn ghost" onclick="go('home')">В меню</button>`:`<button class="btn" onclick="grade()">Сдать экзамен ✓</button><span class="tag">${EX.mcq.length} тест · ${EX.open.length} откр.</span>`}</div>`;
}
function toggle(idx,opt,multi){
  const s=EX?EX.mcq[idx]:null; if(!s||s.graded&&EX.graded)return;
  if(EX&&EX.graded)return;
  if(multi){s.ans=s.ans.includes(opt)?s.ans.filter(x=>x!==opt):[...s.ans,opt];}
  else {s.ans=[opt];}
}
function grade(){
  EX.graded=true; EX.mcq.forEach(s=>{s.graded=true; markResult(s.q.id, isRight(s.ans,s.q.correct));});
  renderExam(); window.scrollTo(0,0);
}
function examScore(){
  let correct=0;
  EX.mcq.forEach(s=>{const a=s.ans.slice().sort(),c=s.q.correct.slice().sort();if(a.length===c.length&&a.every((v,i)=>v===c[i]))correct++;});
  const mcqPts=correct*EXAM.mcqPts, mcqMax=EX.mcq.length*EXAM.mcqPts;
  const openMax=EX.open.length*EXAM.openPts;
  return `<div class="card" style="margin-bottom:14px">
    <h2>Результат</h2>
    <div class="score">Тест: <b>${correct}/${EX.mcq.length}</b> верно → <b>${mcqPts}</b> из ${mcqMax} баллов</div>
    <p style="margin-top:8px">Открытые вопросы оцени сам по эталонам ниже (по ${EXAM.openPts} баллов). Максимум за экзамен — ${mcqMax+openMax} баллов.</p>
  </div>`;
}

/* ---- OPEN ---- */
function openHTML(q,i){
  return `<div class="q open" id="o${i}">
    <div class="meta"><span class="qnum">Open ${i+1}. <span style="color:var(--muted);font-weight:400">${LTITLE[q._lec]?.split('·')[0]||''}· ${esc(q.concept||'')}</span></span><span class="pill multi">${EXAM.openPts} баллов</span></div>
    <div class="qtext">${esc(q.question)}</div>
    <textarea placeholder="Напиши ответ на английском…"></textarea>
    <button class="btn ghost sm" style="margin-top:9px" onclick="this.nextElementSibling.classList.toggle('hidden')">Показать эталон</button>
    <div class="model hidden">
      <h4>Эталонный ответ</h4>
      <div>${esc(q.model_answer)}</div>
      ${q.model_points?.length?`<h4 style="margin-top:10px">Ключевые пункты (для самопроверки)</h4><ul>${q.model_points.map(p=>`<li>${esc(p)}</li>`).join('')}</ul>`:''}
    </div></div>`;
}

/* ---- PRACTICE ---- */
function practice(){
  const cards=BANK.lectures.map((l,i)=>{const L=lecN(l,i);return `
    <div class="card"><h2>${esc(LTITLE[L]||('Лекция '+L))}</h2>
    <p>${(l.mcq||[]).length} тестовых · ${(l.open||[]).length} открытых</p>
    <button class="btn" onclick="go('practiceRun',${L})">Практиковать →</button></div>`;}).join('');
  const wn=getWrong().size;
  const wrongCard = wn
    ? `<div class="card" style="margin-bottom:14px;border-color:var(--bad)"><h2>🔁 Работа над ошибками</h2><p>Неправильно отвеченных вопросов накоплено: <b>${wn}</b>. Прорешай их заново — при верном ответе вопрос уходит из списка.</p><button class="btn" onclick="go('practiceWrong')">Перепройти все неправильные (${wn}) →</button></div>`
    : `<div class="card" style="margin-bottom:14px"><h2>🔁 Работа над ошибками</h2><p>Пока нет неправильных ответов — они начнут копиться по мере прохождения практики и экзаменов.</p></div>`;
  view().innerHTML=`<div class="card" style="margin-bottom:14px"><h2>Практика по темам</h2><p>Выбери лекцию. Вопросы идут по одному с мгновенным разбором.</p></div>${wrongCard}<div class="grid">${cards}</div>`;
}
let PR=null;
function practiceRun(L){
  const lec=BANK.lectures.find((l,i)=>lecN(l,i)===L);
  const qs=shuffle((lec.mcq||[]).map(q=>({...q,_lec:L})));
  PR={qs,i:0,state:qs.map(()=>({ans:[],graded:false})),wrongMode:false};
  renderPractice();
}
function practiceWrong(){
  const w=getWrong();
  const qs=shuffle(allMcq().filter(q=>w.has(q.id)));
  if(!qs.length){view().innerHTML=`<div class="empty"><h2>Нет неправильных вопросов 🎉</h2><p>Всё отвечено верно.</p><button class="btn" onclick="go('practice')">← Назад</button></div>`;return;}
  PR={qs,i:0,state:qs.map(()=>({ans:[],graded:false})),wrongMode:true};
  renderPractice();
}
function renderPractice(){
  if(!PR.qs.length){view().innerHTML='<div class="empty">Нет вопросов</div>';return;}
  const i=PR.i, q=PR.qs[i], s=PR.state[i];
  const ptitle = PR.wrongMode ? '🔁 Работа над ошибками' : (LTITLE[q._lec]?.split('·').slice(0,1)||('Лекция '+q._lec));
  view().innerHTML=`<div class="card" style="margin-bottom:14px;display:flex;justify-content:space-between;align-items:center">
      <div><b>${ptitle}</b> <span style="color:var(--muted)">· вопрос ${i+1} из ${PR.qs.length}</span></div>
      <button class="btn ghost sm" onclick="go('practice')">← Назад</button></div>`
    + mcqHTML(q,i,s)
    + `<div class="bar">
        ${s.graded?'':`<button class="btn" onclick="checkPractice()">Проверить ✓</button>`}
        <div style="display:flex;gap:8px">
          <button class="btn ghost sm" ${i===0?'disabled':''} onclick="PR.i--;renderPractice()">← Назад</button>
          <button class="btn sm" ${i>=PR.qs.length-1?'disabled':''} onclick="PR.i++;renderPractice()">Дальше →</button>
        </div></div>`;
}
function checkPractice(){const st=PR.state[PR.i];st.graded=true;markResult(PR.qs[PR.i].id, isRight(st.ans,PR.qs[PR.i].correct));renderPractice();}
// override toggle for practice context
const _toggle=toggle;
toggle=function(idx,opt,multi){
  if(PR&&view().querySelector('#q'+idx)&&!EX){
    const s=PR.state[PR.i]; if(s.graded)return;
    if(multi)s.ans=s.ans.includes(opt)?s.ans.filter(x=>x!==opt):[...s.ans,opt]; else s.ans=[opt];
    return;
  }
  _toggle(idx,opt,multi);
};

applyTheme(localStorage.getItem('ib_theme')||'light');
home();
</script>
