<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>IB Exam Trainer — Международный менеджмент</title>
<style>
  :root{
    /* СВЕТЛАЯ тема (по умолчанию) — без синего, акцент изумрудный */
    --bg:#f6f5f2; --panel:#ffffff; --panel2:#f2f0ea; --line:#e3dfd7;
    --ink:#262420; --muted:#7c766b; --accent:#0e9b67; --accent2:#0c8a5b;
    --accentink:#ffffff;
    --ok:#16803d; --okbg:#e9f6ee; --bad:#bb3148; --badbg:#fbe9ec;
    --warn:#a9760d; --chip:#eeece6; --exptext:#3a372f;
    --pill1:#4f7a23; --pill1b:#cfe0b0; --pill2:#8a5f10; --pill2b:#ecd9a8;
  }
  body[data-theme="dark"]{
    --bg:#15171a; --panel:#1e2024; --panel2:#26282d; --line:#34373d;
    --ink:#ececea; --muted:#9a958c; --accent:#27b07d; --accent2:#1f9a6c;
    --accentink:#0b130e;
    --ok:#46b673; --okbg:#15321f; --bad:#e0728a; --badbg:#3a1922;
    --warn:#d9a93f; --chip:#2a2d33; --exptext:#d2d8cf;
    --pill1:#9fce6f; --pill1b:#3c4a26; --pill2:#e0b873; --pill2b:#5a4a26;
  }
  *{box-sizing:border-box}
  html,body{margin:0;background:var(--bg);color:var(--ink);font:15px/1.55 -apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif}
  a{color:var(--accent)}
  .wrap{max-width:880px;margin:0 auto;padding:18px 16px 80px}
  header{display:flex;align-items:center;gap:12px;flex-wrap:wrap;border-bottom:1px solid var(--line);padding-bottom:14px;margin-bottom:18px}
  header h1{font-size:18px;margin:0;font-weight:700;letter-spacing:.2px}
  header .sub{color:var(--muted);font-size:12.5px}
  .tag{background:var(--chip);color:var(--muted);border:1px solid var(--line);border-radius:999px;padding:2px 10px;font-size:12px}
  .btn{background:var(--accent2);color:var(--accentink);border:1px solid var(--accent);border-radius:9px;padding:9px 16px;font-size:14px;cursor:pointer;font-weight:600}
  .btn:hover{background:var(--accent)}
  .btn.ghost{background:transparent;color:var(--ink);border-color:var(--line)}
  .btn.ghost:hover{border-color:var(--accent)}
  .btn.sm{padding:6px 11px;font-size:13px}
  .grid{display:grid;gap:14px;grid-template-columns:1fr 1fr}
  @media(max-width:640px){.grid{grid-template-columns:1fr}}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:18px}
  .card h2{margin:0 0 6px;font-size:16px}
  .card p{margin:0 0 14px;color:var(--muted);font-size:13.5px}
  .stat{display:flex;gap:18px;flex-wrap:wrap;margin:6px 0 2px}
  .stat div{font-size:12.5px;color:var(--muted)}
  .stat b{color:var(--ink);font-size:18px;display:block;font-weight:700}
  select{background:var(--panel2);color:var(--ink);border:1px solid var(--line);border-radius:8px;padding:8px 10px;font-size:14px;width:100%}
  .q{background:var(--panel);border:1px solid var(--line);border-radius:13px;padding:16px 17px;margin:0 0 14px}
  .q .meta{display:flex;justify-content:space-between;gap:10px;align-items:center;margin-bottom:8px}
  .q .qnum{font-weight:700;color:var(--muted);font-size:13px}
  .q .qtype{font-size:11.5px}
  .q .qtext{font-size:15.5px;font-weight:600;margin-bottom:12px}
  .opt{display:flex;gap:10px;align-items:flex-start;padding:9px 11px;border:1px solid var(--line);border-radius:9px;margin:6px 0;cursor:pointer;background:var(--panel2)}
  .opt:hover{border-color:var(--accent)}
  .opt input{margin-top:3px;flex:none}
  .opt .lab{flex:none;font-weight:700;color:var(--muted);width:18px}
  .opt.correct{border-color:var(--ok);background:var(--okbg)}
  .opt.wrong{border-color:var(--bad);background:var(--badbg)}
  .opt.miss{border-color:var(--warn);border-style:dashed}
  .expl{margin-top:11px;padding:11px 13px;border-left:3px solid var(--accent2);background:var(--panel2);border-radius:0 9px 9px 0;font-size:13.5px;color:var(--exptext)}
  .expl.show{display:block}
  .expl.hide{display:none}
  .open textarea{width:100%;min-height:120px;background:var(--panel2);color:var(--ink);border:1px solid var(--line);border-radius:9px;padding:10px;font:14px/1.5 inherit;resize:vertical}
  .model{margin-top:11px;padding:12px 14px;background:var(--panel2);border:1px solid var(--line);border-radius:10px;font-size:13.7px}
  .model h4{margin:0 0 7px;font-size:13px;color:var(--accent)}
  .model ul{margin:6px 0 0;padding-left:20px;color:var(--exptext)}
  .bar{position:sticky;bottom:0;left:0;right:0;background:linear-gradient(transparent,var(--bg) 22%);padding:16px 0 8px;margin-top:6px;display:flex;gap:10px;align-items:center;justify-content:space-between;flex-wrap:wrap}
  .score{font-size:15px}
  .score b{font-size:22px}
  .pill{display:inline-block;padding:2px 9px;border-radius:999px;font-size:12px;border:1px solid var(--line)}
  .pill.single{color:var(--pill1);border-color:var(--pill1b)}
  .pill.multi{color:var(--pill2);border-color:var(--pill2b)}
  .hidden{display:none}
  .topbtns{display:flex;gap:8px;flex-wrap:wrap;margin-left:auto}
  .legend{font-size:12px;color:var(--muted);margin:10px 0 0}
  .check{display:flex;align-items:center;gap:7px;font-size:13px;color:var(--muted);margin-top:8px}
  .feedback{font-weight:700;font-size:13px;margin-top:8px}
  .feedback.ok{color:var(--ok)} .feedback.bad{color:var(--bad)}
  .empty{padding:30px;text-align:center;color:var(--muted)}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div>
      <h1>IB Exam Trainer</h1>
      <div class="sub">Международный менеджмент · НИУ ВШЭ · подготовка к экзамену</div>
    </div>
    <div class="topbtns">
      <button class="btn ghost sm" id="themeBtn" onclick="toggleTheme()" title="Сменить тему">☀️ Светлая</button>
      <button class="btn ghost sm" onclick="go('home')">☰ Меню</button>
    </div>
  </header>

  <div id="view"></div>
</div>

<script>
/* === БАНК ВОПРОСОВ === */
const BANK = {"lectures":[{"topic":"Международный менеджмент — Лекция 1: Введение, (де)глобализация, способы выхода на рынок","mcq":[{"id":"L1-01","concept":"IB definition","type":"single","difficulty":"easy","question":"Which statement best defines International Business (IB)?","options":["Cross-border commercial activities between individual companies, groups of companies, government or public sector organizations","The voluntary exchange of goods, services, assets or money between residents of the SAME country","Any business activity carried out exclusively by large Fortune Global 500 corporations","An investment reflecting a lasting interest and control in an enterprise abroad","The shift from self-contained national economies toward an integrated world economy"],"correct":[0],"explanation":"Верно (0): IB — это трансграничная коммерческая деятельность (cross-border commercial activities) между компаниями, группами компаний, государственными или общественными организациями. (1) — искажённое определение торговли (trade): 'within the same country' прямо противоречит идее международного обмена. (2) — IB ведут не только крупные MNE, но и МСП, цифровые фирмы, born globals. (3) — это определение FDI. (4) — это определение глобализации (globalization)."},{"id":"L1-02","concept":"MNE/MNC, home vs host country","type":"single","difficulty":"easy","question":"In the home/host country framework, what is the HOST country?","options":["The country where the MNE's central headquarters is located","Any other country in which the company operates","The country that hosts the WTO and GATT negotiations","The country with the lowest tariffs and trade barriers","The country where the firm's core competence originated"],"correct":[1],"explanation":"Верно (1): принимающая страна (host country) — любая другая страна, где компания работает. (0) — это домашняя страна (home country), где штаб-квартира. (2),(3),(4) — выдуманные критерии, не относящиеся к определению host/home."},{"id":"L1-03","concept":"MNE/MNC, home vs host country","type":"multi","difficulty":"medium","question":"Select ALL statements that correctly characterize a Multinational Enterprise (MNE/MNC).","options":["Also known as a multinational corporation (MNC)","Owns or controls value-adding activities in more than one country","Generally coordinates its activities from a central headquarters","By definition must be among the Fortune Global 500 largest firms","Always has more employees than any purely domestic firm"],"correct":[0,1,2],"explanation":"Верно (0,1,2): MNE = MNC; владеет/контролирует деятельность, создающую стоимость (value-adding activities), в более чем одной стране; обычно координирует из центральной штаб-квартиры. (3) неверно — MNE не обязана быть в Fortune 500; есть и мини-многонационалы (mini-multinationals). (4) неверно — это не следует из определения; разброс размеров MNE огромен."},{"id":"L1-04","concept":"globalization of markets","type":"single","difficulty":"easy","question":"Which feature is characteristic of the GLOBALIZATION OF MARKETS (rather than of production)?","options":["Sourcing of goods and services from different locations around the world","Creation of global value chains (GVCs)","Convergence of consumer preferences and the emergence of global brands and global segments","Reducing costs by exploiting national differences in factors of production","A large share of a product's value coming from foreign component suppliers"],"correct":[2],"explanation":"Верно (2): глобализация рынков (globalization of markets) — конвергенция предпочтений, глобальные бренды и глобальные сегменты (напр. 'городской средний класс'). (0),(1),(3),(4) относятся к глобализации производства (globalization of production): закупка по миру, GVC, снижение издержек через различия в факторах производства, рассеивание создания стоимости."},{"id":"L1-05","concept":"globalization of production / GVC","type":"single","difficulty":"medium","question":"Sourcing components from many countries to build one product, so that a large share of that product's value comes from foreign suppliers, is an example of:","options":["Globalization of markets through convergent consumer tastes","Globalization of production and global value chains (GVCs)","The neomercantilist policy of encouraging exports","Comparative advantage based on opportunity cost","The born-global internationalization pattern"],"correct":[1],"explanation":"Верно (1): закупка компонентов по миру и высокая доля иностранной стоимости в одном продукте — это глобализация производства (globalization of production), рассеивание создания стоимости по глобальной цепочке (GVC). (0) — это глобализация рынков (сторона спроса). (2),(3),(4) — другие концепции."},{"id":"L1-06","concept":"born globals / SMEs / digital firms","type":"multi","difficulty":"medium","question":"IB is NOT only about large multinationals. Select ALL of the following that are also participants in international business.","options":["SMEs exporting niche products","Digital or platform firms serving customers worldwide","Firms using contract-based internationalization (licensing/franchising)","Born globals that internationalize early but still face local barriers","Central banks setting national interest rates"],"correct":[0,1,2,3],"explanation":"Верно (0,1,2,3): помимо крупных MNE, IB ведут МСП с нишевым экспортом, цифровые/платформенные фирмы, контрактная интернационализация (лицензирование/франчайзинг) и born globals (рано выходящие за рубеж, но всё равно сталкивающиеся с локальными барьерами). (4) — центробанки не относятся к участникам IB в этом перечне."},{"id":"L1-07","concept":"drivers: strategic imperatives","type":"single","difficulty":"medium","question":"Strategic imperatives are best described as drivers of globalization that:","options":["Facilitate / make globalization possible (external macro factors)","Motivate globalization — why firms WANT to globalize (internal motives)","Reduce cross-border trade and investment barriers","Provide the technological infrastructure for globalization","Cluster supply chains within regional blocs"],"correct":[1],"explanation":"Верно (1): стратегические императивы (strategic imperatives) — драйверы, которые МОТИВИРУЮТ глобализацию (почему фирмы хотят, внутренние мотивы). (0),(2),(3) описывают изменения среды (environmental changes), которые ОБЛЕГЧАЮТ глобализацию. (4) — признак новой глобализации/деглобализации. Классическая ловушка: не путать 'мотивируют' и 'облегчают'."},{"id":"L1-08","concept":"drivers: strategic imperatives","type":"multi","difficulty":"medium","question":"Select ALL of the four strategic imperatives that motivate firms to globalize.","options":["Leveraging the firm's core competences","Acquiring resources and supplies","Expanding into new markets","Competing with industry rivals","Decline in cross-border trade and investment barriers"],"correct":[0,1,2,3],"explanation":"Верно (0,1,2,3): четыре стратегических императива — использование ключевых компетенций (core competences), приобретение ресурсов и поставок, выход на новые рынки, конкуренция с соперниками. (4) — снижение барьеров относится к ИЗМЕНЕНИЯМ СРЕДЫ (environmental changes), а не к императивам."},{"id":"L1-09","concept":"drivers: environmental changes (trade barriers, technology)","type":"multi","difficulty":"medium","question":"Which of the following belong to the ENVIRONMENTAL CHANGES group of globalization drivers? Select all that apply.","options":["Decline in cross-border trade and investment barriers (GATT/WTO, lower tariffs)","Technological development in communications, information processing and transportation","Leveraging the firm's core competence","Container-based international shipping as a transportation technology","Microprocessors as an information-processing technology"],"correct":[0,1,3,4],"explanation":"Верно (0,1,3,4): изменения среды (environmental changes) — снижение барьеров (через GATT/WTO, ↓ тарифов) и технологическое развитие в коммуникациях, обработке информации (микропроцессоры) и транспорте (контейнерные перевозки). (2) — использование ключевой компетенции относится к стратегическим императивам, а не к среде."},{"id":"L1-10","concept":"drivers: environmental changes (trade barriers, technology)","type":"single","difficulty":"easy","question":"In the framework of technological drivers of globalization, which technology corresponds to the COMMUNICATIONS domain?","options":["Microprocessors","Container-based shipping","The Internet","GATT and WTO agreements","Global value chains"],"correct":[2],"explanation":"Верно (2): коммуникации (communications) — Интернет. (0) микропроцессоры → обработка информации; (1) контейнерные перевозки → транспорт; (3) GATT/WTO — это снижение барьеров, не технология; (4) GVC — следствие глобализации производства, не технология коммуникаций."},{"id":"L1-11","concept":"globalization debate (opponents vs proponents)","type":"single","difficulty":"medium","question":"On the 'shifts in economic power' debate, what is the PROPONENTS' (supporters') argument?","options":["Power shifts to supranational organizations (WTO, EU, UN), undermining national sovereignty","Supranational organizations only have the power that member states grant them; real power stays with nation-states","Globalization destroys jobs in developed economies","The rich-poor gap widens and benefits are unevenly distributed","Firms relocate to countries with lax labour and environmental regulation"],"correct":[1],"explanation":"Верно (1): сторонники (proponents) считают, что наднациональные организации имеют лишь ту власть, которую дали члены; реальная власть остаётся у nation-states. (0) — это аргумент противников (opponents) по сдвигу власти. (2) — противников по рабочим местам. (3) — противников по распределению богатства. (4) — противников по труду/экологии."},{"id":"L1-12","concept":"globalization debate (opponents vs proponents)","type":"multi","difficulty":"hard","question":"Select ALL statements that correctly represent OPPONENTS' arguments in the globalization debate.","options":["Offshoring to low-wage countries destroys jobs in developed economies","Firms flee to countries with lax (weak) regulation, increasing pollution and exploitation","Cheaper goods raise worldwide purchasing power, benefiting the global economy","The rich-poor gap is widening and the benefits of globalization are unevenly shared","Economic progress and FDI push countries toward stricter regulations"],"correct":[0,1,3],"explanation":"Верно (0,1,3): противники (opponents) утверждают, что офшоринг убивает рабочие места на Западе; фирмы бегут в страны со слабым регулированием → загрязнение/эксплуатация; разрыв богатые/бедные растёт. (2) и (4) — это аргументы СТОРОННИКОВ (proponents): дешевле товары → выше покупательная способность; прогресс и FDI подталкивают к более строгим нормам."},{"id":"L1-13","concept":"world is flat vs CAGE / distance still matters","type":"single","difficulty":"medium","question":"Which author and view are correctly paired with the 'world without national boundaries' thesis, also known as the 'hyper-globalist view'?","options":["Pankaj Ghemawat — 'Distance Still Matters'","Thomas L. Friedman — 'The World Is Flat'","Michael Porter — National Competitive Advantage","Raymond Vernon — Product Life Cycle","Adam Smith — Absolute Advantage"],"correct":[1],"explanation":"Верно (1): 'мир плоский' (The World Is Flat), гипер-глобалистский взгляд — Thomas L. Friedman. (0) Ghemawat — это противоположная позиция 'Distance Still Matters'. (2),(3),(4) — авторы теорий торговли, не относящиеся к этому тезису."},{"id":"L1-14","concept":"world is flat vs CAGE / distance still matters","type":"multi","difficulty":"medium","question":"In the 'Distance Still Matters' view (CAGE), which four types of distance between countries are identified? Select all that apply.","options":["Cultural distance","Administrative distance","Geographical distance","Economic distance","Technological distance"],"correct":[0,1,2,3],"explanation":"Верно (0,1,2,3): четыре расстояния по Гемавату (Ghemawat) — культурное (cultural), административное (administrative), географическое (geographical), экономическое (economic); акроним CAGE. (4) 'технологическое' расстояние — выдуманный дистрактор, его в списке нет."},{"id":"L1-15","concept":"world is flat vs CAGE / distance still matters","type":"single","difficulty":"medium","question":"A firm internationalizes very early (a 'born global'), yet in many countries it faces local laws, bans and strikes that force it to adapt market by market. This pattern is best understood as evidence for:","options":["The 'World Is Flat' thesis that distance no longer matters","The idea that technology lets a born global avoid all local barriers","The 'Distance Still Matters' view — national differences (CAGE) still shape international business","The globalization of production and GVCs","A successful greenfield FDI strategy"],"correct":[2],"explanation":"Верно (2): даже born global, столкнувшись с локальными законами, запретами и протестами и вынужденный адаптироваться к каждому рынку, иллюстрирует 'Distance Still Matters' — различия стран (CAGE) по-прежнему важны. (0) и (1) противоречат смыслу: барьеры не исчезли. (3),(4) — другие концепции."},{"id":"L1-16","concept":"deglobalization / new globalization","type":"multi","difficulty":"medium","question":"Select ALL characteristics of the era of new globalization / deglobalization.","options":["Production and demand are increasingly regional","Value creation leans more on data, services and ideas than on pure goods flows","Supply chains cluster within blocs","Tighter policy, security and compliance constraints","Complete elimination of all national differences and a single flat market"],"correct":[0,1,2,3],"explanation":"Верно (0,1,2,3): новая глобализация/деглобализация — производство и спрос регионализируются, стоимость опирается на данные/услуги/идеи, цепочки группируются внутри блоков, жёстче policy/security/compliance. (4) неверно — это тезис 'мир плоский' (World Is Flat); деглобализация, наоборот, не отменяет глобализацию, а трансформирует её к регионализации и блокам."},{"id":"L1-17","concept":"mercantilism / neomercantilism","type":"single","difficulty":"easy","question":"What is the main idea of MERCANTILISM?","options":["Increase the country's wealth by encouraging exports and discouraging imports","Export goods in which a country is relatively more productive based on opportunity cost","Let free trade work without any government intervention","Locate production where transaction costs are lowest","Achieve economies of scale by selling beyond the home market"],"correct":[0],"explanation":"Верно (0): меркантилизм — богатеть, поощряя экспорт и ограничивая импорт (субсидии + тарифы); современная версия — неомеркантилизм/протекционизм. (1) — сравнительное преимущество (Рикардо). (2) — свободная торговля (Смит). (3) — интернализация. (4) — новая теория торговли."},{"id":"L1-18","concept":"absolute advantage (Smith)","type":"single","difficulty":"medium","question":"According to Adam Smith's theory of absolute advantage, a country should:","options":["Export goods in which it is relatively more productive based on opportunity cost","Export goods in which it is specialized (produces most efficiently) and import the rest from countries specialized in them","Encourage exports while restricting imports through tariffs and subsidies","Export only after moving production to developing countries in the standardized stage","Invest abroad only when ownership, location and internalization advantages all align"],"correct":[1],"explanation":"Верно (1): абсолютное преимущество (Adam Smith, 1776) — экспортируй то, в чём специализирован/эффективнее, импортируй остальное у тех, кто специализирован. (0) — это сравнительное преимущество (Рикардо, через opportunity cost). (2) — меркантилизм. (3) — жизненный цикл продукта. (4) — OLI Даннинга."},{"id":"L1-19","concept":"comparative advantage (Ricardo, opportunity cost)","type":"single","difficulty":"hard","question":"What is the KEY insight of Ricardo's theory of comparative advantage that distinguishes it from absolute advantage?","options":["A country should only export the good in which it has the highest output per hour of labour","Trade is beneficial to both countries even if one is absolutely more productive in BOTH goods, because opportunity costs differ","Government intervention through subsidies and tariffs maximizes national wealth","Trade is only worthwhile when each country is absolutely best at one of the two goods","A country should import everything it can to pressure domestic firms to become efficient"],"correct":[1],"explanation":"Верно (1): суть сравнительного преимущества (Рикардо) — торговля выгодна обеим странам, даже если одна абсолютно сильнее в ОБОИХ товарах, потому что различаются альтернативные издержки (opportunity cost). (0) и (3) описывают абсолютное преимущество (любимая ловушка). (2) — меркантилизм. (4) — искажённый аргумент про эффект импорта."},{"id":"L1-20","concept":"product life cycle (Vernon)","type":"single","difficulty":"medium","question":"In Raymond Vernon's product life cycle theory, what happens in the STANDARDIZED product stage?","options":["The product is introduced on the local market with limited exports","Investment in production rises and competition emerges","Demand stabilizes and production moves to developing countries","Average costs fall as output expands beyond the home market","The firm transfers its intellectual property abroad for a royalty"],"correct":[2],"explanation":"Верно (2): на стандартизированной стадии (standardized) спрос стабилизируется, производство переносится в развивающиеся страны. (0) — новая стадия (new product). (1) — зрелая стадия (maturing). (3) — экономия на масштабе (новая теория торговли). (4) — лицензирование."},{"id":"L1-21","concept":"new trade theory / economies of scale","type":"single","difficulty":"medium","question":"New trade theory explains trade in differentiated goods mainly through:","options":["Economies of scale — average production costs decrease as output increases","Economies of scope — cost savings from producing a wider variety of goods","Opportunity cost differences between two countries","The four interacting elements of Porter's Diamond","Lasting interest and control through foreign direct investment"],"correct":[0],"explanation":"Верно (0): новая теория торговли опирается на экономию на масштабе (economies of scale) — средние издержки падают с ростом объёма выпуска при выходе за домашний рынок. (1) economies of scope — другое понятие (экономия от разнообразия), классическая ловушка-подмена. (2) — сравнительное преимущество. (3) — национальное конкурентное преимущество Портера. (4) — FDI."},{"id":"L1-22","concept":"Porter diamond (4 factors)","type":"multi","difficulty":"medium","question":"Select ALL four elements of Porter's Diamond (national competitive advantage).","options":["Factor conditions","Demand conditions","Related and supporting industries","Firm strategy, structure and rivalry","Internalization advantage"],"correct":[0,1,2,3],"explanation":"Верно (0,1,2,3): ромб Портера (Porter's Diamond) — факторные условия, условия спроса, родственные и поддерживающие отрасли, стратегия фирмы/структура/соперничество. (4) internalization advantage относится к теории FDI (OLI), а не к ромбу Портера."},{"id":"L1-23","concept":"FDI flows / stock / inflow / outflow","type":"multi","difficulty":"medium","question":"Match the correct FDI terminology. Select ALL correct statements.","options":["Flow of FDI = the amount of FDI undertaken over a given period of time","Outflows of FDI = the flows of FDI out of a country","Inflows of FDI = the flows of FDI into a country","Stock of FDI = the total accumulated value of foreign-owned assets at a given time","Stock of FDI = the amount of FDI undertaken in a single transaction"],"correct":[0,1,2,3],"explanation":"Верно (0,1,2,3): поток (flow) — объём за период; отток (outflows) — из страны; приток (inflows) — в страну; запас (stock) — накопленная стоимость на момент времени. (4) неверно — stock измеряется накопленно на момент времени, а не как одна сделка."},{"id":"L1-24","concept":"ownership advantage theory","type":"single","difficulty":"medium","question":"Ownership advantage theory states that a firm can succeed abroad through FDI because:","options":["Transaction costs are high and internalizing operations gives needed control","It owns a competitive advantage at home (brand, technology, know-how, data, capabilities) transferable to foreign markets","The host country is attractive in terms of costs, access and institutions","All three OLI conditions are simultaneously satisfied","Average costs fall as production output increases"],"correct":[1],"explanation":"Верно (1): теория преимущества собственности (ownership advantage) — фирма с конкурентным преимуществом дома (бренд, технологии, ноу-хау, данные, способности) может перенести эти активы за рубеж через FDI. (0) — это интернализация. (2) — преимущество расположения (location). (3) — OLI как синтез. (4) — экономия на масштабе."},{"id":"L1-25","concept":"internalization theory (transaction costs)","type":"single","difficulty":"hard","question":"According to internalization theory, when should a firm enter a foreign market via FDI rather than contractual arrangements?","options":["When transaction costs are LOW, so it can simply export, license or franchise","When transaction costs are HIGH — e.g. IP and quality control are critical, coordination is complex, partner opportunism risk is high","When it lacks any transferable ownership advantage","When the home market is still immature and growing fast","When it wants to share investment and risk with a local partner"],"correct":[1],"explanation":"Верно (1): по теории интернализации, ВЫСОКИЕ транзакционные издержки (критичны ИС и контроль качества, сложна координация, высок риск оппортунизма партнёра) → входить через FDI. (0) — при НИЗКИХ издержках выбирают контрактные формы (экспорт/лицензия/франшиза), это противоположный случай. (2) — отсутствие O ведёт к 'no entry'. (3),(4) — другие мотивы, не критерий интернализации."},{"id":"L1-26","concept":"Dunning OLI","type":"single","difficulty":"medium","question":"Dunning's eclectic (OLI) theory predicts that FDI will occur when:","options":["At least one of the O, L or I advantages is present","Ownership advantage is present but location is unattractive","All three conditions — Ownership, Location and Internalization advantages — are simultaneously met","Transaction costs are low and the firm prefers contractual arrangements","The product reaches the standardized stage of its life cycle"],"correct":[2],"explanation":"Верно (2): по эклектической теории Даннинга FDI возникает, когда сложились ВСЕ ТРИ преимущества (O + L + I). (0) неверно — нужны все три, а не хотя бы одно. (1) — есть O, нет L → производить дома и экспортировать, не FDI. (3) — при низких издержках выбирают контракты. (4) — это другая теория (Вернон)."},{"id":"L1-27","concept":"modes of entry overview (control/risk ladder)","type":"single","difficulty":"easy","question":"The four modes of entry are ranked by increasing capital, control and risk. Which ordering (lowest to highest) is correct?","options":["Exporting → Licensing → Franchising → FDI","FDI → Franchising → Licensing → Exporting","Licensing → Exporting → FDI → Franchising","Exporting → FDI → Licensing → Franchising","Franchising → Licensing → Exporting → FDI"],"correct":[0],"explanation":"Верно (0): лестница способов выхода по росту контроля/капитала/риска — экспорт → лицензирование → франчайзинг → FDI. Остальные варианты нарушают этот порядок."},{"id":"L1-28","concept":"exporting forms (direct/indirect/intracorporate)","type":"multi","difficulty":"medium","question":"Select ALL three forms of exporting, with correct descriptions.","options":["Direct exporting — manufacturer sells directly to the foreign customer","Indirect exporting — manufacturer sells via a domestic intermediary that then exports","Intra-corporate transfers — sales between affiliated units of the same MNE in different countries","Portfolio exporting — passive financial investment in foreign securities","Greenfield exporting — building a new export plant abroad from scratch"],"correct":[0,1,2],"explanation":"Верно (0,1,2): три формы экспорта — прямой (производитель → зарубежный покупатель), косвенный (через отечественного посредника), внутрифирменный (между подразделениями одной MNE). (3) — выдуманный термин (portfolio — это пассивная инвестиция, не форма экспорта). (4) — greenfield это стратегия FDI, а не форма экспорта."},{"id":"L1-29","concept":"international licensing","type":"single","difficulty":"medium","question":"International licensing is best defined as a contractual arrangement in which, for a specified period in return for a royalty, a company licenses:","options":["Its entire operating system, brand names and logos, assisting the partner on an ongoing basis","The use of its intellectual property (patents, trademarks or copyrights)","Active control over property and assets located abroad","The sale of finished products made at home for resale abroad","Joint ownership of a new enterprise with a local partner"],"correct":[1],"explanation":"Верно (1): международное лицензирование — передача права на ИС (патенты, ТЗ, копирайт) на срок за роялти. (0) — это франчайзинг (вся бизнес-модель + постоянное сопровождение). (2) — FDI. (3) — экспорт. (4) — joint venture."},{"id":"L1-30","concept":"international franchising vs licensing","type":"multi","difficulty":"hard","question":"Select ALL statements that correctly distinguish FRANCHISING from LICENSING.","options":["Franchising transfers the whole business model (operating systems, brand names, logos), not just IP","Under franchising the franchiser assists the franchisee on an ongoing basis","Franchising typically involves longer-term commitments than licensing","Licensing transfers only intellectual property (patents, trademarks, copyrights)","Licensing requires the licensor to actively manage the licensee's daily operations"],"correct":[0,1,2,3],"explanation":"Верно (0,1,2,3): франчайзинг передаёт целостную бизнес-модель (операции+бренд+логотипы), франчайзер постоянно сопровождает франчайзи, обязательства дольше; лицензирование — только ИС. (4) неверно — при лицензировании лицензиар НЕ управляет операциями лицензиата; контроль над маркетингом лицензиата как раз ограничен."},{"id":"L1-31","concept":"FDI strategies: greenfield/acquisition/JV","type":"multi","difficulty":"medium","question":"Select ALL correct pairings of FDI strategy and its description.","options":["Greenfield — starting a new operation from scratch","Acquisition — buying an existing company in the foreign country","Joint venture — a company jointly owned by two or more independent companies","Greenfield — buying a controlling stake in an established local firm","Joint venture — licensing IP to a foreign partner for a royalty"],"correct":[0,1,2],"explanation":"Верно (0,1,2): greenfield — новое предприятие с нуля; acquisition — покупка существующей фирмы; joint venture — совместная собственность 2+ независимых фирм. (3) — это описание acquisition, а не greenfield (подмена). (4) — это лицензирование, а не JV."},{"id":"L1-32","concept":"OLI decision tree (no entry/export/license/FDI)","type":"single","difficulty":"hard","question":"In the OLI decision tree, what is the recommended outcome if a firm HAS ownership and location advantages, but does NOT need internalization (control)?","options":["No entry should be considered","Produce at home and export","Licensing / franchising","FDI via greenfield, acquisition or joint venture","Acquire a local competitor immediately"],"correct":[2],"explanation":"Верно (2): есть O и L, нет I (контроль не критичен) → лицензирование/франчайзинг. (0) — исход при отсутствии O (нет передаваемого преимущества). (1) — есть O, но нет L (страна непривлекательна) → дома + экспорт. (3) — когда все три YES. (4) — частный случай FDI, требующий всех трёх условий."},{"id":"L1-33","concept":"OLI decision tree (no entry/export/license/FDI)","type":"multi","difficulty":"hard","question":"Using the OLI decision tree, select ALL correct outcome statements.","options":["No Ownership advantage → NO ENTRY","Ownership yes, Location no → PRODUCE AT HOME AND EXPORT","Ownership yes, Location yes, Internalization no → LICENSING / FRANCHISING","All three (O, L, I) yes → FDI","No Ownership advantage → FDI via joint venture"],"correct":[0,1,2,3],"explanation":"Верно (0,1,2,3): нет O → не выходить; есть O, нет L → дома+экспорт; есть O и L, нет I → лицензия/франшиза; все три YES → FDI. (4) неверно — без O никакой выход (включая FDI) не рекомендуется, это 'no entry'."}],"open":[{"id":"L1-O1","concept":"Dunning OLI","question":"Explain Dunning's eclectic (OLI) theory and how its three components combine to predict that a firm will undertake FDI. In your answer, clarify why OLI is described as a synthesis rather than a separate alternative theory.","model_answer":"Эклектическая теория Даннинга (Dunning's eclectic theory), или OLI, объясняет, КОГДА фирма выходит за рубеж именно через FDI. FDI происходит, только когда одновременно выполнены все три условия: O — преимущество собственности (Ownership advantage): есть ли у нас передаваемое преимущество (бренд, технологии, ноу-хау, рутины, данные, способности)? L — преимущество расположения (Location advantage): привлекательна ли страна с точки зрения издержек, доступа и институтов? I — преимущество интернализации (Internalization advantage): нужен ли нам контроль (когда транзакционные издержки высоки — критичны ИС и качество, сложна координация, высок риск оппортунизма партнёра)? Формула: O + L + I → FDI. OLI — это синтез, а не отдельная альтернатива: Ownership и Internalization — это две из трёх теорий FDI (теория преимущества собственности и теория интернализации), которые Даннинг объединил ('эклектическая') и добавил третий элемент — Location. Поэтому OLI вбирает в себя предыдущие теории, отвечая на разные вопросы: ownership — что вообще делает экспансию возможной; internalization — почему FDI, а не контракт; location — где. Только совпадение всех трёх ведёт к FDI.","model_points":["FDI возникает только при выполнении ВСЕХ трёх условий O+L+I","O = передаваемое преимущество (бренд, технологии, ноу-хау, данные, способности)","L = привлекательность страны (издержки, доступ, институты)","I = нужен ли контроль; высокие транзакционные издержки → интернализация","OLI = синтез: Ownership и Internalization — две из трёх теорий FDI, Даннинг добавил Location","Формула O + L + I → FDI"]},{"id":"L1-O2","concept":"comparative advantage (Ricardo, opportunity cost)","question":"Discuss the difference between the theories of absolute advantage (Smith) and comparative advantage (Ricardo). Why can trade still benefit two countries even when one is absolutely more productive in both goods?","model_answer":"Абсолютное преимущество (absolute advantage, Адам Смит, 'Богатство народов', 1776): страна должна экспортировать товары, в которых специализирована и которые производит эффективнее (абсолютно больше единиц на час труда), и импортировать остальное у стран, специализированных в них. Смит также считал, что госвмешательство вредит свободной торговле. Сравнительное преимущество (comparative advantage, Дэвид Рикардо): важна не абсолютная, а ОТНОСИТЕЛЬНАЯ производительность, измеряемая через альтернативные издержки (opportunity cost) — ценность, от которой отказываешься, чтобы получить товар. Главный вывод: торговля выгодна ОБЕИМ странам, даже если одна абсолютно сильнее в обоих товарах, потому что у стран различаются альтернативные издержки. Каждая страна специализируется там, где её относительное преимущество выше (а отстающая — там, где её отставание меньше), и обе выигрывают. Мнемоника: абсолютное = 'кто быстрее'; сравнительное = 'от чего меньше жаль отказаться'. (Числовой пример с двумя товарами и двумя странами студент может привести любой подходящий: когда одна страна сильнее в обоих, но соотношения затрат различаются.)","model_points":["Абсолютное преимущество (Смит, 1776): экспорт того, где производишь абсолютно эффективнее","Сравнительное преимущество (Рикардо): относительная производительность через opportunity cost","Ключевой вывод Рикардо: торговля выгодна обеим даже при абсолютном превосходстве одной в ОБОИХ товарах","Решают альтернативные издержки (opportunity cost), а не 'кто быстрее'","Страна специализируется там, где её относительное преимущество выше","Госвмешательство (по Смиту) вредит свободной торговле"]},{"id":"L1-O3","concept":"international franchising vs licensing","question":"Explain the difference between international licensing and international franchising as modes of entry, and discuss the key advantages and disadvantages of each across the four standard criteria (growth, cost, operations, risk).","model_answer":"Лицензирование (international licensing) — договорное соглашение, по которому фирма передаёт право использования своей интеллектуальной собственности (патенты, товарные знаки, авторские права) на определённый срок зарубежной компании в обмен на роялти. Франчайзинг (international franchising) — франчайзер разрешает франчайзи использовать целостную бизнес-модель: операционные системы, бренд и логотипы, тоже за роялти, НО с двумя отличиями: обязательства более долгосрочные и франчайзер ПОСТОЯННО сопровождает франчайзи (assists on an ongoing basis). Мнемоника: лицензия = одолжил патент; франшиза = одолжил весь бизнес и нянчишь его. По четырём критериям. Лицензирование: Growth — быстрый вход и присутствие бренда, но слабый контроль над маркетингом лицензиата; Cost — низкие вложения (лицензиат сам производит и дистрибутирует), но доход только от роялти, не от продаж; Operational — избегаешь производства/логистики/регулирования, но зависишь от способностей и приверженности лицензиата; Risk — ниже политический/экономический риск, чем у FDI, но угроза кражи ИС и создания будущего конкурента. Франчайзинг: Growth — быстрый вход с локальными партнёрами, но слабый контроль над франчайзи; Cost — низкие вложения, роялти без владения бизнесом, но доход зависит от успеха франчайзи; Operational — использует локальные знания франчайзи, но сложности мониторинга; Risk — ниже финансовый риск, чем FDI, но угроза бренду и репутации при плохом управлении.","model_points":["Лицензирование = передача только ИС (патенты, ТЗ, копирайт) на срок за роялти","Франчайзинг = передача всей бизнес-модели (операции + бренд + логотипы)","Два отличия франчайзинга: дольше обязательства + постоянное сопровождение франчайзи","Лицензирование Cost: доход от роялти, а не от продаж","Общий риск обоих: слабый контроль над партнёром, кража ИС/угроза бренду","Оба — низкие вложения и ниже риск, чем у FDI; 4 критерия: Growth/Cost/Operational/Risks"]},{"id":"L1-O4","concept":"globalization of production / GVC","question":"Explain the distinction between the globalization of markets and the globalization of production, and discuss why cross-border coordination has become a strategic capability rather than just an operational task. (You may illustrate with any example of your choice.)","model_answer":"Глобализация состоит из двух разных явлений. Глобализация рынков (globalization of markets) касается СПРОСА/потребления: конвергенция потребительских предпочтений, глобальные бренды и глобальные сегменты ('городской средний класс'), конкуренция на глобальном уровне — фирма продаёт по сути одно и то же по миру. Глобализация производства (globalization of production) касается ПРЕДЛОЖЕНИЯ/создания стоимости: закупка товаров и услуг из разных точек мира и построение глобальных цепочек создания стоимости (GVC). Зачем — чтобы эффективнее конкурировать и снижать издержки/повышать качество, используя национальные различия в стоимости и качестве факторов производства (труд, энергия, земля). Типичная иллюстрация — сложный продукт (например авиалайнер или смартфон), большая доля стоимости которого приходится на иностранных поставщиков компонентов. Важный нюанс: IB — это не только 'продавать за рубеж' (selling abroad), а часто построение и управление глобальными системами (building and governing global systems), где дизайн, компоненты, сборка, логистика и сервис разнесены по странам. Поэтому трансграничная координация (cross-border coordination) через множество страновых сред — разные правила, валюты, культуры, конкуренты — становится стратегической способностью (strategic capability), а не просто операционной задачей.","model_points":["Глобализация рынков = сторона СПРОСА: конвергенция вкусов, глобальные бренды/сегменты","Глобализация производства = сторона ПРЕДЛОЖЕНИЯ: sourcing по миру + GVC","Цель производства: ↓ издержек / ↑ качества через различия в факторах производства (труд, энергия, земля)","Пример (на выбор студента): сложный продукт с большой долей иностранной стоимости","IB ≠ только selling abroad, а building and governing global systems","Трансграничная координация становится strategic capability, а не операционной рутиной"]}]},{"topic":"Лекция 2 — Формальные институты (International Business and Formal Institutions)","mcq":[{"id":"L2-01","concept":"formal institutions and functions","type":"single","difficulty":"easy","question":"Formal institutions are best defined as:","options":["Laws, regulations and rules that differ between countries and determine what can be achieved in a country","Informal norms, values and cultural beliefs shared by a society","The set of multinational enterprises operating within a country","Voluntary codes of conduct adopted by industry associations"],"correct":[0],"explanation":"Верно (A): формальные институты (formal institutions) — это «laws, regulations and rules», которые различаются между странами и определяют, что достижимо в стране. B — это неформальные институты (informal institutions). C — это фирмы, а не институты. D — добровольные кодексы не являются законами/регуляциями страны."},{"id":"L2-02","concept":"formal institutions and functions","type":"multi","difficulty":"medium","question":"Select ALL the key functions of formal institutions:","options":["To reduce uncertainty by limiting the range of acceptable actions","To constrain opportunistic behavior","To reduce transaction costs of doing business in a particular country","To maximize a single firm's market share against competitors","To eliminate all cultural differences between countries"],"correct":[0,1,2],"explanation":"Верно (A, B, C) — три функции формальных институтов: снижать неопределённость (reduce uncertainty), сдерживать оппортунистическое поведение (constrain opportunistic behavior), снижать транзакционные издержки (reduce transaction costs). D — институты не служат интересам одной фирмы. E — устранение культурных различий не их функция (это про неформальные институты/культуру)."},{"id":"L2-03","concept":"legal systems: common law","type":"single","difficulty":"easy","question":"Which statement about common law is correct?","options":["It is based on tradition, precedent and custom, gives greater freedom to design contracts, and requires detailed contracts to fill gaps","It is based on a codification of what is and is not permissible, providing greater legal certainty","It is based on religious teachings and turns a country into a theocracy","It is whatever those in power say it is, with lack of consistency and appeal procedures"],"correct":[0],"explanation":"Верно (A): общее право (common law) опирается на традицию, прецедент и обычай, даёт больше свободы в контрактах, но требует детальных контрактов для заполнения пробелов. B описывает гражданское право (civil law). C — религиозное право (religious law). D — бюрократическое право (bureaucratic law)."},{"id":"L2-04","concept":"common vs civil law","type":"single","difficulty":"medium","question":"A foreign investor enters a country where the legal system relies on judicial precedent and custom rather than a comprehensive written code. What practical implication follows for the investor's contracting?","options":["Contracts should be drafted in great detail to fill gaps, because the system gives broad freedom but few codified defaults","Contracts can be left short and generic, because a comprehensive code already specifies most outcomes","Contracts are irrelevant, because the country is a theocracy governed by religious teachings","Contracts can be made or broken at will, because there is no consistency or appeal"],"correct":[0],"explanation":"Верно (A): прецедент + обычай = общее право (common law). Его практическое следствие — свобода в дизайне контрактов, но необходимость очень детальных контрактов, чтобы заполнить пробелы. B описывает гражданское право (civil law: кодекс задаёт умолчания). C — религиозное право/теократия. D — бюрократическое право (диктатуры). Вопрос проверяет понимание различия common vs civil без опоры на запоминание списка стран."},{"id":"L2-05","concept":"civil law","type":"single","difficulty":"medium","question":"Civil law systems are characterized by:","options":["Codification of what is and is not permissible, greater legal certainty, with heavy bureaucracy as a downside","Reliance on precedent and judge-made rulings as the primary source of law","No predictability or appeal procedures, with contracts easily made or broken","Rules derived directly from Islamic religious teachings"],"correct":[0],"explanation":"Верно (A): гражданское право (civil law) основано на кодификации (codification) разрешённого/запрещённого, даёт правовую определённость (legal certainty), но минус — тяжёлая бюрократия. B — про common law (прецедент). C — про bureaucratic law. D — про religious law."},{"id":"L2-06","concept":"religious law / theocracy","type":"single","difficulty":"easy","question":"A country that applies religious law (e.g. Islamic law) as the basis of its legal system is called a:","options":["Theocracy","Democracy","Totalitarian state","Customs union"],"correct":[0],"explanation":"Верно (A): страна, применяющая религиозное право, называется теократия (theocracy). B (демократия) и C (тоталитаризм) — политические системы, не правовые. D (таможенный союз) — уровень региональной интеграции."},{"id":"L2-07","concept":"religious law / theocracy","type":"single","difficulty":"medium","question":"Religious law (such as Islamic law) as a legal system is best described as:","options":["A system based on religious teachings, where the country governed by it is a theocracy and legal complexity for business is high","A system based on codified statutes giving strong legal certainty","A system based on tradition and precedent requiring detailed contracts","A system where the law is whatever those in power decide, with no appeal"],"correct":[0],"explanation":"Верно (A): религиозное право (religious law) опирается на религиозные учения; страна под ним — теократия (theocracy), сложность для бизнеса высокая. B — civil law. C — common law. D — bureaucratic law. Переписано с узнавания конкретного списка стран на понимание сути системы."},{"id":"L2-08","concept":"bureaucratic law","type":"single","difficulty":"medium","question":"Bureaucratic law, the legal system found in dictatorships, is best described as:","options":["Law that is whatever those in power say it is, lacking consistency, predictability and appeal procedures; contracts can be easily made or broken","Law based on codified statutes providing strong consumer and employee protection","Law rooted in tradition and precedent requiring detailed contracts","An international treaty governing cross-border sale of goods"],"correct":[0],"explanation":"Верно (A): бюрократическое право (bureaucratic law) — право в диктатурах: «то, что скажут власти», без последовательности, предсказуемости и обжалования; контракты легко заключить и расторгнуть. B — civil law. C — common law. D — Венская конвенция (CISG), не правовая система."},{"id":"L2-09","concept":"Vienna Convention / CISG","type":"single","difficulty":"medium","question":"The Vienna Convention (CISG) is:","options":["The United Nations Convention on Contracts for the International Sale of Goods, governing contracts between sellers and buyers based in different countries","A regional trade bloc operating as a customs union","The agreement that created the World Bank and the IMF","A treaty pegging national currencies to gold"],"correct":[0],"explanation":"Верно (A): Венская конвенция (Vienna Convention / CISG) — Конвенция ООН о договорах международной купли-продажи товаров, регулирует контракты между продавцами и покупателями из разных стран. B — про региональную интеграцию. C — Бреттон-Вудское соглашение. D — золотой стандарт."},{"id":"L2-10","concept":"nationalization (expropriation/confiscation)","type":"multi","difficulty":"medium","question":"Select ALL statements about nationalization that are correct:","options":["It is the conversion of privately owned property into state-owned property by the local government","Its forms include expropriation and confiscation","Natural resource industries such as mining, oil and gas are most vulnerable to it","It opens key sectors of the host economy to international businesses","It is identical to privatization"],"correct":[0,1,2],"explanation":"Верно (A, B, C): национализация (nationalization) — перевод частной собственности в государственную; формы — экспроприация (expropriation) и конфискация (confiscation); наиболее уязвимы природно-ресурсные отрасли (mining, oil, gas). D — это приватизация (privatization), противоположный вектор. E — национализация и приватизация противоположны."},{"id":"L2-11","concept":"privatization","type":"single","difficulty":"easy","question":"Privatization is defined as:","options":["The conversion of state-owned property into privately owned property, creating opportunities for international businesses to enter key sectors","The conversion of privately owned property into state-owned property","The threat of restrictions to repatriate funds","A government plan that allocates resources and owns businesses"],"correct":[0],"explanation":"Верно (A): приватизация (privatization) — перевод госсобственности в частную, открывает иностранному бизнесу ключевые сектора. B — национализация (ловушка на противоположный вектор). C — трансферный риск (transfer risk). D — командная экономика (command economy)."},{"id":"L2-12","concept":"collectivism vs individualism","type":"multi","difficulty":"medium","question":"Select ALL statements that correctly describe the collectivism–individualism axis:","options":["Collectivism emphasizes the importance of collective goals over individual goals","Collectivism tends to restrict private enterprise","Individualism promotes free market and private enterprise","Individualism gives priority to collective goals over individual freedom","Individualism is a type of religious legal system"],"correct":[0,1,2],"explanation":"Верно (A, B, C): коллективизм (collectivism) ставит коллективные цели выше индивидуальных и ограничивает частное предпринимательство; индивидуализм (individualism) продвигает свободный рынок и частное предпринимательство. D переворачивает суть индивидуализма. E неверно — индивидуализм это политическая ось, не правовая система. Переписано так, чтобы не опираться на запоминание конкретного списка стран."},{"id":"L2-13","concept":"totalitarianism vs democracy","type":"single","difficulty":"easy","question":"In a totalitarian political system:","options":["One person or political party has absolute control in all spheres, political power is monopolized and opposition is forbidden","People are directly involved in decision making and institutions provide a secure environment for business","The government plans production and allocates resources","Exchange rates are determined purely by supply and demand"],"correct":[0],"explanation":"Верно (A): тоталитаризм (totalitarianism) — один человек/партия с абсолютной властью во всех сферах, власть монополизирована, оппозиция запрещена. B описывает демократию (democracy). C — командная экономика. D — плавающий курс, не относится к политической оси."},{"id":"L2-14","concept":"lobbying vs corruption","type":"single","difficulty":"medium","question":"Political systems determine how businesses can influence legislative processes through:","options":["Lobbying (mostly legal) or corruption (mostly illegal)","Expropriation or confiscation","Offshoring or reshoring","Exports or imports"],"correct":[0],"explanation":"Верно (A): бизнес влияет на законодательный процесс через лоббирование (lobbying — mostly legal) или коррупцию (corruption — mostly illegal). B — формы национализации. C — типы шоринга. D — потоки торговли. Ключевое различие: lobbying законен, corruption — нет."},{"id":"L2-15","concept":"political risk: ownership","type":"single","difficulty":"easy","question":"Ownership risk, one of the three types of political risk, refers to the:","options":["Threat of confiscation or expropriation","Threat of changes in laws, tax codes, terrorism and civil wars","Threat of restrictions to repatriate funds","Threat of currency exchange-rate fluctuations only"],"correct":[0],"explanation":"Верно (A): риск собственности (ownership risk) — угроза конфискации/экспроприации (связан с национализацией). B — операционный риск (operating risk). C — трансферный риск (transfer risk). D — не отдельный тип политического риска."},{"id":"L2-16","concept":"political risk: operating","type":"multi","difficulty":"medium","question":"Select ALL threats that fall under operating risk:","options":["Changes in laws","Changes in tax codes","Changes in environmental standards","Terrorism and civil wars","Restrictions to repatriate funds"],"correct":[0,1,2,3],"explanation":"Верно (A, B, C, D): операционный риск (operating risk) — угрозы изменения законов, налоговых кодексов, экологических норм, а также терроризм и гражданские войны. E (ограничения на репатриацию средств) — это трансферный риск (transfer risk), не операционный."},{"id":"L2-17","concept":"political risk: transfer","type":"single","difficulty":"easy","question":"Transfer risk is the:","options":["Threat of restrictions to repatriate funds","Threat of confiscation or expropriation","Threat of terrorism and civil wars","Risk that a country adopts a common currency"],"correct":[0],"explanation":"Верно (A): трансферный риск (transfer risk) — угроза ограничений на репатриацию (вывод) средств. B — ownership risk. C — operating risk. D — не относится к политическому риску. Различай три вида по объекту угрозы: собственность / операции / перевод денег."},{"id":"L2-18","concept":"market vs command vs mixed economy","type":"multi","difficulty":"medium","question":"Select ALL correct pairings of economic system and its description:","options":["Market economy — driven by supply and demand, businesses privately owned, monopolies discouraged","Command economy — government plans production and allocates resources, businesses state-owned","Mixed economy — elements of both market and command economies","Market economy — the government plans production and owns the businesses","Command economy — businesses are privately owned and prices set by supply and demand"],"correct":[0,1,2],"explanation":"Верно (A, B, C): рыночная (market) — спрос/предложение, частная собственность, монополии сдерживаются; командная (command) — госпланирование и распределение ресурсов, госсобственность; смешанная (mixed) — элементы обеих. D и E перепутывают признаки рыночной и командной систем."},{"id":"L2-19","concept":"Economic Freedom Index (4 groups)","type":"multi","difficulty":"medium","question":"The Economic Freedom Index is built from four groups. Select ALL of the four groups:","options":["Rule of law","Government size","Regulatory efficiency","Open markets","Innovation output"],"correct":[0,1,2,3],"explanation":"Верно (A, B, C, D): четыре группы Индекса экономической свободы (Economic Freedom Index) — Rule of law, Government size, Regulatory efficiency, Open markets. E (Innovation output) — это субиндекс Глобального инновационного индекса (GII), ловушка на смешение индексов."},{"id":"L2-20","concept":"Economic Freedom Index (4 groups)","type":"single","difficulty":"hard","question":"Which three components belong to the 'Rule of law' group of the Economic Freedom Index?","options":["Property rights, government integrity, judicial effectiveness","Government spending, tax burden, fiscal health","Business freedom, labor freedom, monetary freedom","Trade freedom, investment freedom, financial freedom"],"correct":[0],"explanation":"Верно (A): группа «Rule of law» = property rights, government integrity, judicial effectiveness. B — это Government size. C — Regulatory efficiency. D — Open markets. Каждая из 4 групп содержит ровно 3 компонента."},{"id":"L2-21","concept":"GNI per capita / income groups","type":"multi","difficulty":"medium","question":"Regarding the World Bank income classification, select ALL correct statements:","options":["Economic development is typically measured by gross national income per capita (GNI per capita)","Classifications are based on GNI per capita expressed in current USD","The four income groups are Low, Lower-middle, Upper-middle and High income","Classification is based on a country's Global Innovation Index score","The four groups are Floating, Pegged, Common and Fixed"],"correct":[0,1,2],"explanation":"Верно (A, B, C): развитие измеряется по ВНД на душу населения (GNI per capita), классификация — по GNI per capita в текущих USD, четыре группы дохода: Low / Lower-middle / Upper-middle / High income (World Bank). D — это GII, другой индекс. E — это режимы валютного курса, не группы дохода."},{"id":"L2-22","concept":"institutional support","type":"multi","difficulty":"hard","question":"Strong market-supportive institutions provide institutional support by (select ALL):","options":["Ensuring companies can make profits through low inflation, stable exchange rates and low trade barriers","Forcing companies to follow formal rules, reducing over-dependence on informal relationships","Protecting intellectual property rights, which fuels innovation and increased inflows of FDI","Guaranteeing that all firms become state-owned monopolies","Eliminating the need for any contracts between firms"],"correct":[0,1,2],"explanation":"Верно (A, B, C): институциональная поддержка (institutional support) обеспечивает прибыльность (низкая инфляция, стабильные курсы, низкие барьеры), заставляет следовать формальным правилам (меньше зависимости от неформальных связей), защищает права ИС → приток FDI. D и E противоречат лекции."},{"id":"L2-23","concept":"IP rights enforcement","type":"single","difficulty":"medium","question":"Which of the following are intellectual property (IP) rights, and why does their enforcement matter?","options":["Patents, trademarks, trade secrets, design rights and copyright; weak protection makes a country less attractive to technology-driven MNCs","Tariffs, quotas, subsidies and embargoes; weak enforcement reduces tax revenue","Exports, imports, inflows and outflows; weak enforcement raises inflation","Common, civil, religious and bureaucratic law; weak enforcement causes theocracy"],"correct":[0],"explanation":"Верно (A): права ИС (IP rights) — патенты, товарные знаки, коммерческие тайны, дизайн, авторское право; слабая защита → риск контрафакта → страна менее привлекательна для технологичных МНК. B — торговые барьеры. C — потоки торговли/ПИИ. D — правовые системы."},{"id":"L2-24","concept":"Global Innovation Index","type":"multi","difficulty":"medium","question":"Select ALL correct statements about the structure of the Global Innovation Index (GII):","options":["It is an overall innovation index covering a large set of countries","It is built from innovation inputs that support innovative activities","It is built from innovation outputs that represent the results of innovative activities","Its final score combines an input sub-index and an output sub-index","It measures only a country's GNI per capita"],"correct":[0,1,2,3],"explanation":"Верно (A, B, C, D): GII — общий индекс инноваций (WIPO); структура — входы (inputs, поддерживают инновации) + выходы (outputs, результаты), итог = комбинация input- и output-субиндексов. E неверно — GII не измеряет ВНД на душу (это World Bank income classification). Убран вариант про конкретного лидера рейтинга-года, оставлена проверка структуры индекса."},{"id":"L2-25","concept":"monetary system: gold standard / Bretton Woods / floating","type":"multi","difficulty":"medium","question":"Select ALL correct statements about the evolution of the international monetary system:","options":["Under the gold standard each currency was pegged to a fixed amount of gold, establishing its par value","Under Bretton Woods only the US dollar was convertible to gold and other currencies set rates relative to the dollar","Under the post-Bretton Woods system central banks moved to a floating exchange rate system","Under the gold standard exchange rates floated freely with supply and demand","Under Bretton Woods every currency was directly convertible to gold"],"correct":[0,1,2],"explanation":"Верно (A, B, C): золотой стандарт — фиксированные курсы, валюта привязана к золоту (par value); Бреттон-Вудс — только доллар конвертируем в золото, остальные привязаны к доллару; пост-Бреттон-Вудс — плавающие курсы. D неверно (золотой стандарт = фиксированный). E неверно (только доллар, не каждая валюта)."},{"id":"L2-26","concept":"exchange-rate regimes (floating/pegged/common currency)","type":"single","difficulty":"medium","question":"Which description of an exchange-rate regime is correct?","options":["Pegged system — a currency's value is fixed to another country's currency","Floating system — several countries share one common central bank and a single currency","Common currency system — the rate is set purely by supply and demand within each member country","Floating system — a currency's value is fixed to another country's currency"],"correct":[0],"explanation":"Верно (A): привязанный курс (pegged) — стоимость валюты зафиксирована к валюте другой страны. B путает: общий центробанк и единая валюта — это система общей валюты (common currency). C путает: чисто спрос/предложение — это плавающий (floating), а не общая валюта. D приписывает плавающему режиму признак привязанного. Переписано на различение режимов по их сути, без опоры на конкретный пример валюты со слайда."},{"id":"L2-27","concept":"World Bank vs IMF","type":"multi","difficulty":"medium","question":"Select ALL statements that correctly distinguish the World Bank and the IMF:","options":["The World Bank was originally created to finance reconstruction of European economies after WWII","The World Bank's mission today is to help develop poor economies and reduce poverty","The IMF was established to ensure stability of the international monetary system","The IMF monitors economies and lends to member countries facing difficulties","The IMF was created to enforce the Vienna Convention on the sale of goods"],"correct":[0,1,2,3],"explanation":"Верно (A, B, C, D): Всемирный банк (World Bank) изначально финансировал восстановление Европы, новая миссия — развитие бедных стран и борьба с бедностью; МВФ (IMF) создан для стабильности валютной системы, мониторит экономики и кредитует страны в трудностях. E неверно — МВФ не связан с Венской конвенцией (CISG). Заменён вариант с конкретным числом стран-членов на сущностный признак функции МВФ."},{"id":"L2-28","concept":"regional integration: 5 levels","type":"single","difficulty":"hard","question":"In the cumulative ladder of regional integration, which feature is FIRST added at the Common Market level (but not present at the Customs Union level)?","options":["Free movement of goods, people and capital","Common external tariff","Removal of intragroup tariffs","Integration of political and economic affairs"],"correct":[0],"explanation":"Верно (A): общий рынок (common market) добавляет свободное движение товаров, людей и капитала. B (единый внешний тариф) появляется на уровне таможенного союза. C (устранение внутренних тарифов) — уже на уровне ЗСТ. D (интеграция полит. и экон. дел) — на уровне политического союза. Логика накопительная."},{"id":"L2-29","concept":"regional integration: 5 levels","type":"multi","difficulty":"medium","question":"Select ALL features that are present at the Economic Union level (cumulative ladder):","options":["Removal of intragroup tariffs","Common external tariff","Free movement of goods, people and capital","Common economic policies","Full integration of political and economic affairs"],"correct":[0,1,2,3],"explanation":"Верно (A, B, C, D): экономический союз (economic union) — уровень 4, накопительно включает устранение внутренних тарифов (ЗСТ), единый внешний тариф (таможенный союз), свободное движение факторов (общий рынок) ПЛЮС общую экономическую политику. E (полная интеграция полит. и экон. дел) — это уже политический союз (уровень 5)."},{"id":"L2-30","concept":"regional integration: classifying a bloc by its level","type":"single","difficulty":"hard","question":"A group of countries has removed tariffs among themselves and agreed on a single common external tariff toward non-members, but does NOT allow free movement of people and capital. At which level of regional integration is this bloc?","options":["Customs union","Free trade area","Common market","Economic union"],"correct":[0],"explanation":"Верно (A): устранение внутренних тарифов + единый внешний тариф = таможенный союз (customs union). Если бы был только первый признак — это ЗСТ (free trade area). Свободное движение людей/капитала добавилось бы на уровне общего рынка (common market), общая экономическая политика — на экономическом союзе. Переписано с узнавания членства конкретных блоков на классификацию уровня по признакам."},{"id":"L2-31","concept":"Uppsala model","type":"single","difficulty":"medium","question":"The Uppsala Model, central to traditional internationalization, holds that firms:","options":["Expand gradually and incrementally, prioritizing geographically and culturally close markets to reduce uncertainty","Bypass physical expansion through digital transformation and prioritize resilience","Always enter the most distant high-risk markets first to capture growth","Choose foreign markets solely on the basis of geopolitical alliances"],"correct":[0],"explanation":"Верно (A): модель Уппсалы (Uppsala Model) — постепенное, инкрементальное расширение, приоритет географически/культурно близким рынкам ради снижения неопределённости. B описывает нео-интернационализацию. C противоречит логике «близкие рынки сначала». D — детерминанта нео-модели (геополитика)."},{"id":"L2-32","concept":"traditional vs neo-internationalization","type":"multi","difficulty":"medium","question":"Select ALL statements that correctly distinguish traditional from neointernationalization:","options":["Traditional internationalization focuses on cost advantages, economies of scale and supply chain optimization","In traditional internationalization physical infrastructure plays a central role","Neointernationalization prioritizes resilience, agility and ethical considerations","In neointernationalization digital transformation plays a key role, bypassing physical expansion","Neointernationalization is rooted in the Uppsala Model and incremental expansion"],"correct":[0,1,2,3],"explanation":"Верно (A, B, C, D): традиционная (traditional) — издержки, эффект масштаба, оптимизация цепочки, центральная роль физической инфраструктуры; нео (neo) — устойчивость, гибкость, этика, ключевая роль цифровой трансформации. E неверно — модель Уппсалы и инкрементальное расширение относятся к ТРАДИЦИОННОЙ модели."},{"id":"L2-33","concept":"shoring types (offshoring/reshoring/nearshoring/friendshoring/safeshoring)","type":"multi","difficulty":"medium","question":"Select ALL correct descriptions of the shoring types:","options":["Offshoring — moving production abroad to cut costs (the original model)","Reshoring — bringing production back home","Nearshoring — moving production to geographically close countries","Friendshoring — moving production to allied / friendly countries","Reshoring — moving production to the lowest-cost foreign country regardless of risk"],"correct":[0,1,2,3],"explanation":"Верно (A, B, C, D): офшоринг (offshoring) — вынос за рубеж ради дешёвых издержек; решоринг (reshoring) — возврат домой; ниаршоринг (nearshoring) — в близкие страны; френдшоринг (friendshoring) — в дружественные/союзные страны. E неверно — это описание офшоринга, а не решоринга."}],"open":[{"id":"L2-O1","concept":"regional integration: 5 levels","question":"Explain the five levels of regional economic integration. For each level, state what new feature is added relative to the previous level, and give one example of your choice.","model_answer":"Региональная интеграция (regional economic integration) — это накопительная лестница из пяти уровней, где каждый следующий = все признаки предыдущего ПЛЮС один новый.\n\n1. Зона свободной торговли (Free Trade Area) — новый признак: устранение внутренних тарифов (removal of intragroup tariffs). Пример: NAFTA/USMCA или ASEAN.\n2. Таможенный союз (Customs Union) — добавляется единый внешний тариф (common external tariff) для третьих стран. Пример: Андское сообщество (Andean Community).\n3. Общий рынок (Common Market) — добавляется свободное движение товаров, людей и капитала (free movement of goods, people and capital). Пример: Mercosur.\n4. Экономический союз (Economic Union) — добавляется общая экономическая политика (common economic policies), часто общая валюта. Пример: ЕС.\n5. Политический союз (Political Union) — добавляется полная интеграция политических и экономических дел. Пример: США.\n\nГлавная идея для экзамена — накопительность: на каждом уровне страны сдают всё больше суверенитета, поднимаясь от простого снятия тарифов до единого государства. (Примеры можно приводить любые — важна логика уровней.)","model_points":["5 уровней по порядку: Free Trade Area → Customs Union → Common Market → Economic Union → Political Union","каждый новый признак: внутр. тарифы↓ → единый внеш. тариф → свободное движение товаров/людей/капитала → общая эконополитика → интеграция полит. и экон. дел","накопительная логика (каждый уровень включает предыдущие)","по одному примеру на уровень (любые подходящие)"]},{"id":"L2-O2","concept":"legal systems: common law","question":"Discuss the four types of legal systems. Contrast common law and civil law in particular, and explain what a theocracy is.","model_answer":"Правовая система (legal system) — формальные правила поведения и процессы исполнения законов; фирма обязана соблюдать законы и страны происхождения (home country), и всех принимающих стран (host countries). Четыре типа:\n\n1. Общее право (common law) — основано на традиции, прецеденте и обычае (tradition, precedent, custom). Для бизнеса: больше свободы в дизайне контрактов, НО нужны детальные контракты, чтобы заполнить пробелы в правовой рамке.\n2. Гражданское/континентальное право (civil law) — основано на кодификации (codification) разрешённого/запрещённого. Плюс: правовая определённость (legal certainty), защита потребителей/работников. Минус: тяжёлая бюрократия.\n3. Религиозное право (religious law) — на основе религиозных учений (например, исламское право). Страна, применяющая такое право, называется теократия (theocracy).\n4. Бюрократическое право (bureaucratic law) — в диктатурах; право = воля власти, без последовательности, предсказуемости и обжалования; контракты легко заключить и расторгнуть.\n\nКлючевой контраст common vs civil: common law = «свобода + прецедент, нужны подробные контракты», civil law = «кодекс + предсказуемость, но бюрократия».","model_points":["определение legal system + соблюдение законов home и host country","common law: традиция/прецедент/обычай, свобода + детальные контракты","civil law: кодификация, правовая определённость, бюрократия","religious law → теократия (theocracy); bureaucratic law в диктатурах","чёткий контраст common vs civil"]},{"id":"L2-O3","concept":"traditional vs neo-internationalization","question":"Explain how the relocation determinants differ between traditional internationalization and neointernationalization, and describe the role of the different shoring types in this shift.","model_answer":"Традиционная и нео-интернационализация различаются прежде всего детерминантами выбора локации (relocation determinants).\n\nТрадиционная (traditional internationalization): логика — минимизация издержек. Детерминанты: (1) издержки (cost-related): труд, производство, логистика; (2) регуляторная среда: трудовое право, защита ИС, налоговые льготы. Укоренена в модели Уппсалы (Uppsala Model) — постепенное расширение на близкие рынки. Драйверы: открытые рынки и FTA, стабильные правила под зонтиком WTO, cost efficiency через офшоринг. Ключевой ресурс — физическая инфраструктура.\n\nНео-интернационализация (neointernationalization): ответ на потрясения (пандемия, геополитика, санкции, волатильность). Логика — устойчивость + геополитическая осознанность. Детерминанты: (1) геополитическая среда: торговая политика — тарифы/санкции, политическая стабильность; (2) операционная гибкость: инновации, устойчивость цепочек поставок; (3) управление рисками: диверсификация по регионам. Приоритет — resilience, agility, ethics; ключевой ресурс — цифровая трансформация.\n\nТипы шоринга показывают спектр ответов нео-модели на разрушение классического офшоринга: офшоринг (offshoring) минимизирует издержки (исходная модель); решоринг (reshoring) — возврат домой; ниаршоринг (nearshoring) — в близкие страны; френдшоринг (friendshoring) — в дружественные/союзные страны (про геополитику/санкции); сейфшоринг (safeshoring) — в безопасные/низкорисковые юрисдикции. Все четыре «не-офшоринга» жертвуют издержками ради надёжности.","model_points":["традиционная: издержки (труд/производство/логистика) + регуляторная среда; модель Уппсалы; физ. инфраструктура; зонтик WTO/офшоринг","нео: геополитика (тарифы/санкции/стабильность) + операционная гибкость (инновации/цепочки) + риск-менеджмент (диверсификация); цифровая трансформация; resilience/agility/ethics","ключевой сдвиг: от cost-efficiency к устойчивости/геополитической осознанности","5 типов шоринга и их смысл; offshoring = издержки, остальные = надёжность"]},{"id":"L2-O4","concept":"formal institutions and functions","question":"Explain what formal institutions are and their key functions. Then discuss what consequences weak or unpredictable formal institutions can create for an international firm (you may illustrate with any example of your choice).","model_answer":"Формальные институты (formal institutions) — это законы, регуляции и правила (laws, regulations and rules); они различаются между странами и определяют, что в стране достижимо. Это ядро институционального взгляда (institution-based view) на международный бизнес.\n\nТри ключевые функции: (1) снижать неопределённость (reduce uncertainty), ограничивая диапазон приемлемых действий; (2) сдерживать оппортунистическое поведение (constrain opportunistic behavior); (3) снижать транзакционные издержки ведения бизнеса в стране (reduce transaction costs).\n\nКогда формальные институты слабы или непредсказуемы (произвольное/противоречивое регулирование, непоследовательные решения судов и регуляторов, отсутствие защиты прав собственности и ИС), фирма сталкивается с резким ростом неопределённости и транзакционных издержек. Последствия: потеря доверия потребителей (lost consumer trust), финансовые потери, дорогостоящие усилия для возврата на рынок, остановка продаж по регуляторному решению, риск изъятия/запрета продукции. Важная черта — такие эффекты могут распространяться за пределы одной страны: запрет или скандал в одной юрисдикции часто провоцирует запреты и изъятия в соседних рынках, поскольку другие регуляторы реагируют на тот же сигнал.\n\nВывод: слабые/непредсказуемые формальные институты создают серьёзные репутационные и финансовые риски, выходящие за пределы одной страны. (В качестве иллюстрации можно привести любой кейс, где противоречивое регулирование ударило по международной компании.)","model_points":["определение: laws, regulations and rules; различаются между странами; институциональный взгляд","3 функции: снижать неопределённость, сдерживать оппортунизм, снижать транзакционные издержки","механизм вреда: непредсказуемость/противоречивость регулирования → рост неопределённости и транзакционных издержек","последствия: потеря доверия, фин. потери, остановка/изъятие продукции, дорогой возврат на рынок","эффект может распространяться за пределы одной страны; вывод про репутационный и финансовый риск (пример — на выбор студента)"]}]},{"topic":"Лекция 3 — Неформальные институты (культура, этика, КСО)","mcq":[{"id":"L3-01","concept":"formal vs informal institutions; values; norms","type":"single","question":"According to the institution-based view, which statement correctly describes informal institutions?","options":["Informal institutions consist of laws, regulations and rules","Informal institutions consist of values and norms","Informal institutions are codified social rules enforced by courts","Informal institutions are the same as formal institutions but applied abroad","Informal institutions consist only of religious doctrines"],"correct":[1],"explanation":"Верно: неформальные институты (informal institutions) = ценности (values) и нормы (norms). Вариант про «laws, regulations and rules» — это формальные институты (formal institutions), классическая ловушка-смешение. «Codified social rules enforced by courts» неверно: нормы как раз uncodified (некодифицированы). Они не равны формальным институтам за рубежом. Религиозные доктрины — лишь часть, не определение."
